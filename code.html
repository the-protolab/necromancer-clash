                if (!shield) return;
                shield.classList.remove("held");
                shield.style.transition = "opacity 280ms ease";
                shield.style.opacity = "0";
                setTimeout(() => shield.remove(), 300);
            }

            function showBurst(target, kind) {
                const center = centerOf(combatElement(target));
                const burst = document.createElement("div");
                burst.className = `effect-burst ${kind}`;
                burst.style.left = `${center.x}px`;
                burst.style.top = `${center.y}px`;
                effectLayer.appendChild(burst);
                setTimeout(() => burst.remove(), 560);
            }

            function healParticles(target) {
                const center = centerOf(combatElement(target));
                for (let i = 0; i < 10; i++) {
                    const particle = document.createElement("div");
                    particle.className = "effect-heal";
                    particle.style.left = `${center.x + (Math.random() - 0.5) * 62}px`;
                    particle.style.top = `${center.y + (Math.random() - 0.5) * 42}px`;
                    particle.style.setProperty("--heal-x", `${(Math.random() - 0.5) * 90}px`);
                    effectLayer.appendChild(particle);
                    setTimeout(() => particle.remove(), 960);
                }
            }

            function showFrozen(target) {
                const el = combatElement(target);
                el.classList.remove("frozen");
                void el.offsetWidth;
                el.classList.add("frozen");
                setTimeout(() => el.classList.remove("frozen"), 650);
            }

            function floatNumber(target, text, kind) {
                const center = centerOf(combatElement(target));
                const node = document.createElement("div");
                node.className = `float-text ${kind}`;
                node.textContent = text;
                node.style.left = `${center.x}px`;
                node.style.top = `${center.y - 30}px`;
                effectLayer.appendChild(node);
                setTimeout(() => node.remove(), 1020);
            }

            // Centered, non-blocking win banner. Lives on #game-world (not #effect-layer, which
            // startNewMatch clears) so it can keep fading over the freshly-seeded next level.
            // Resolves after a short beat — long enough to read — then the caller continues;
            // the node fades out on its own animation and self-removes.
            function showAchievementToast(title, line) {
                const TOAST_MS = 2600;     // must match the .achievement-toast CSS animation
                const CONTINUE_MS = 1100;  // when the next level is allowed to start underneath
                const node = document.createElement("div");
                node.className = "achievement-toast";
                const titleEl = document.createElement("div");
                titleEl.className = "toast-title";
                titleEl.textContent = title;
                const lineEl = document.createElement("div");
                lineEl.className = "toast-line";
                lineEl.textContent = line;
                node.appendChild(titleEl);
                node.appendChild(lineEl);
                world.appendChild(node);
                setTimeout(() => node.remove(), TOAST_MS);
                return sleep(CONTINUE_MS);
            }

            async function soulExtraction() {
                const from = centerOf(combatElement("player"));
                const to = centerOf(combatElement("ghost"));
                const souls = [];
                for (let i = 0; i < 18; i++) {
                    const soul = document.createElement("div");
                    soul.className = "soul";
                    soul.style.left = `${from.x + (Math.random() - 0.5) * 46}px`;
                    soul.style.top = `${from.y + (Math.random() - 0.5) * 54}px`;
                    soul.style.setProperty("--soul-x", `${to.x - from.x + (Math.random() - 0.5) * 90}px`);
                    soul.style.setProperty("--soul-y", `${to.y - from.y - 30 + (Math.random() - 0.5) * 80}px`);
                    soul.style.animationDelay = `${i * 45}ms`;
                    effectLayer.appendChild(soul);
                    souls.push(soul);
                }
                await sleep(1500);
                souls.forEach((soul) => soul.remove());

                const form = document.createElement("div");
                form.className = "ghost-form";
                form.style.left = `${to.x}px`;
                form.style.top = `${to.y}px`;
                effectLayer.appendChild(form);
                await sleep(1200);
                form.remove();
            }

            function combatElement(target) {
                return target === "player" ? playerCombatant : ghostCombatant;
            }

            function centerOf(element) {
                const worldRect = world.getBoundingClientRect();
                const rect = element.getBoundingClientRect();
                return {
                    x: rect.left - worldRect.left + rect.width / 2,
                    y: rect.top - worldRect.top + rect.height / 2
                };
            }

            function shake(target) {
                const img = target === "player" ? playerImg : ghostImg;
                if (img.hidden) return;
                img.classList.remove("hit-shake");
                void img.offsetWidth;
                img.classList.add("hit-shake");
            }

            function pulseHeal(target) {
                const img = target === "player" ? playerImg : ghostImg;
                if (img.hidden) return;
                img.classList.remove("heal-pulse");
                void img.offsetWidth;
                img.classList.add("heal-pulse");
            }

            function playSound(id) {
                const url = assetUrls[id];
                if (!url) return;
                try {
                    const audio = new Audio(url);
                    audio.volume = 0.35;
                    audio.play().catch(() => {});
                } catch (error) {
                    logError("sound failed", error);
                }
            }

            function setMessage(text) {
                roundStatus.textContent = text;
            }

            function cloneAction(action) {
                return {
                    type: action.type,
                    count: action.count,
                    direction: action.direction || "default"
                };
            }

            function clamp(value, min, max) {
                return Math.max(min, Math.min(max, value));
            }

            function escapeAttr(value) {
                return String(value).replace(/"/g, "&quot;");
            }

            function sleep(ms) {
                return new Promise((resolve) => setTimeout(resolve, ms));
            }

            function logError(message, error) {
                try {
                    if (window.lib && typeof lib.log === "function") {
                        lib.log(`${message}: ${error && error.message ? error.message : error}`);
                    } else {
                        console.warn(message, error);
                    }
                } catch (logFailure) {
                    console.warn(message, error);
                }
            }
        }

        if (!window.lib || location.hostname === "127.0.0.1" || location.hostname === "localhost" || location.protocol === "file:") {
            installLocalAstrocadeFallback();
            setTimeout(() => {
                run(window.mode || "play");
            }, 0);
        }
    </script>
</body>
