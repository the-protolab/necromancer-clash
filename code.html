        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: #140d22;
            color: #f8f4ea;
            font-family: "Jaro", Georgia, "Times New Roman", serif;
            touch-action: none;
            user-select: none;
        }

        button {
            font: inherit;
        }

        /* Cold-load splash. The % is real: it comes from the core-image preload
           (loadCoreImages reports done/total). Letters bounce one-by-one via a
           staggered animation-delay; the whole overlay fades out once the first
           board has rendered from the now-warm cache. */
        #loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #140d22;
            font-family: "Jaro", Georgia, "Times New Roman", serif;
            transition: opacity 0.4s ease;
        }
        #loading-overlay.is-done {
            opacity: 0;
            pointer-events: none;
        }
        #loading-word {
            display: flex;
            font-size: clamp(30px, 8vw, 54px);
            letter-spacing: 0.04em;
            color: #d9b85c;
        }
        #loading-word span {
            display: inline-block;
            animation: loading-bounce 1s ease-in-out infinite;
        }
        @keyframes loading-bounce {
            0%, 65%, 100% { transform: translateY(0); }
            32% { transform: translateY(-0.32em); }
        }
        #loading-pct {
            font-size: clamp(15px, 4vw, 22px);
            color: #f8f4ea;
            opacity: 0.8;
            font-variant-numeric: tabular-nums;
        }

        #game-world {
            --battle-height: 42dvh;
            --gold: #d9b85c;
            --tile-gap: 6px;
            /* Shared board width: the grid AND the turn-status line use this so the
               text's left edge lines up exactly with the (centered) grid's left edge. */
            --board-w: min(92vw, max(250px, calc(100dvh - var(--battle-height) - 88px)), 520px);
            /* Single global patterned background — one continuous, drifting pattern layer
               behind BOTH the battlefield and the grid (no per-section duplication). */
            --pattern-tile-w: 609px;
            --pattern-opacity: 0.05;
            --pattern-anim-duration: 45s;
            --app-bg-gradient-from: #2E404F;
            --app-bg-gradient-to: #1E242F;
            position: relative;
            isolation: isolate;
            display: grid;
            grid-template-rows: minmax(230px, var(--battle-height)) minmax(0, 1fr);
            width: 100%;
            height: 100dvh;
            min-height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, var(--app-bg-gradient-from) 0%, var(--app-bg-gradient-to) 100%);
        }

        /* The one and only pattern layer: spans the whole world, drifts seamlessly. */
        #game-world::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background-image: var(--zone-pattern-image, none);
            background-repeat: repeat;
            background-size: var(--pattern-tile-w) auto;
            opacity: var(--pattern-opacity);
            animation: zone-pattern-drift var(--pattern-anim-duration) linear infinite;
        }

        /* Keep both sections above the global pattern layer. */
        #battlefield,
        #grid-zone {
            z-index: 1;
        }

        #battlefield {
            position: relative;
            /* No overflow:hidden — lets the ghost's glow bleed across the section division
               instead of being clipped into a hard cut. #game-world still bounds the viewport. */
            background: transparent; /* global pattern (game-world) shows through, no seam */
        }

        .battle-top {
            position: relative;
            z-index: 2;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: start;
            gap: 12px;
            padding: 12px 18px 0;
        }

        .game-title {
            margin: 0;
            color: #fff7d2;
            font-size: 30px;
            line-height: 1;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.72);
        }

        /* Round indicator, moved here to the top-left of the battlefield. */
        .round-banner {
            align-self: start;
            justify-self: start;
            color: #d8cda8;
            font-size: 18px;
            line-height: 1.2;
            white-space: nowrap;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
        }

        .combat-row {
            position: absolute;
            z-index: 2;
            inset: 54px 0 0;
            display: grid;
            grid-template-columns: minmax(130px, 1fr) minmax(60px, 14vw) minmax(130px, 1fr);
            align-items: end;
            gap: 8px;
            padding: 0 5vw 10px;
        }

        .combatant {
            position: relative;
            display: grid;
            justify-items: center;
            align-content: end;
            min-width: 0;
            height: 100%;
        }

        .combatant.ghost-side {
            justify-self: end;
        }

        .combatant.player-side {
            justify-self: start;
        }

        .hp-panel {
            width: min(210px, 34vw);
            margin-bottom: 6px;
            padding: 0;
            filter: drop-shadow(0 3px 9px rgba(0, 0, 0, 0.7));
        }

        .name-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            color: #fff4cf;
            font-size: 16px;
            line-height: 1;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.92);
        }

        .hp-track {
            position: relative;
            width: 100%;
            height: 20px;
            margin-top: 5px;
            box-sizing: border-box;
            overflow: hidden;
            border: 4px solid #1a1a1a;
            border-radius: 10px;
            background: #2b2b2b;
        }

        .hp-fill {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 10px 0 0 10px;
            overflow: hidden;
            background: #3ec46d;
            box-shadow: inset 0 3px 0 rgba(255, 255, 255, 0.35),
                        inset 0 -4px 0 rgba(0, 0, 0, 0.25);
            transition: width 260ms ease;
        }

        /* Animated diagonal stripes over the HP fill (barber-pole "flow").
           Composited version: the stripe layer is one tile (40px) wider and slides via
           transform: translateX — runs on the GPU compositor, NO per-frame repaint.
           Parent's overflow:hidden clips the overhang; the 40px shift loops seamlessly
           because the stripe pattern repeats every 40px. */
        .hp-fill::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: -40px;
            width: calc(100% + 40px);
            pointer-events: none;
            background-image: repeating-linear-gradient(45deg,
                rgba(255, 255, 255, 0.18) 0 14px, transparent 14px 28px);
            background-size: 40px 40px;
            animation: flow 1s linear infinite;
            will-change: transform;
        }

        /* SHIELD absorption layer: a blue bar drawn over the green HP fill.
           Width = shield/maxHp. Depletes (left→right) revealing HP underneath. */
        .shield-fill {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            border-radius: 10px 0 0 10px;
            background: #2563eb;
            box-shadow: inset 0 3px 0 rgba(255, 255, 255, 0.35),
                        inset 0 -4px 0 rgba(0, 0, 0, 0.3);
            transition: width 420ms ease;
            pointer-events: none;
            z-index: 2;
        }

        /* Shield value as a big, readable number floating over the character's head.
           Absolutely positioned (not a grid item) so it never resizes the sprite or
           pushes layout — it just overlays on top. */
        .shield-badge {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 7;
            font-size: clamp(28px, 5vw, 44px);
            font-weight: 800;
            color: #8fd2ff;
            text-shadow:
                0 0 4px rgba(0, 0, 0, 0.95),
                0 2px 5px rgba(0, 0, 0, 0.95),
                0 0 16px rgba(37, 99, 235, 0.9);
            opacity: 0;
            transition: opacity 200ms ease;
            pointer-events: none;
            white-space: nowrap;
        }

        @keyframes flow {
            from { transform: translateX(0); }
            to { transform: translateX(40px); }
        }

        .character-wrap {
            position: relative;
            width: min(25vw, 190px);
            max-width: 190px;
            min-width: 108px;
            height: min(27dvh, 218px);
            min-height: 128px;
            display: grid;
            place-items: end center;
        }

        .character-img {
            --flip: 1; /* horizontal facing; -1 mirrors the sprite (used by the ghost) */
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 12px 18px rgba(0, 0, 0, 0.68));
            transform: scaleX(var(--flip));
            transition: transform 180ms ease, filter 180ms ease;
        }

        /* The official ghost reuses the PLAYER sprite, mirrored horizontally and given the
           same spectral icon treatment as the move-hint (no bespoke ghost art needed). */
        #game-world.official-ghost .ghost-side .character-img {
            --flip: -1;
            filter:
                grayscale(1) sepia(1) hue-rotate(168deg) saturate(5) brightness(1.35)
                drop-shadow(0 0 8px rgba(150, 235, 255, 1))
                drop-shadow(0 0 20px rgba(120, 220, 255, 0.85))
                drop-shadow(0 0 38px rgba(90, 200, 255, 0.6))
                drop-shadow(0 12px 18px rgba(0, 0, 0, 0.55));
            opacity: 0.65; /* leve transparência espectral */
            animation: ghostGlow 3.2s ease-in-out infinite;
        }

        /* Slow breathing aura so the ghost reads as luminous, not just dimmed. */
        @keyframes ghostGlow {
            0%, 100% {
                filter:
                    grayscale(1) sepia(1) hue-rotate(168deg) saturate(5) brightness(1.3)
                    drop-shadow(0 0 8px rgba(150, 235, 255, 1))
                    drop-shadow(0 0 18px rgba(120, 220, 255, 0.8))
                    drop-shadow(0 0 32px rgba(90, 200, 255, 0.5))
                    drop-shadow(0 12px 18px rgba(0, 0, 0, 0.55));
            }
            50% {
                filter:
                    grayscale(1) sepia(1) hue-rotate(168deg) saturate(5) brightness(1.45)
                    drop-shadow(0 0 12px rgba(170, 240, 255, 1))
                    drop-shadow(0 0 26px rgba(120, 220, 255, 0.95))
                    drop-shadow(0 0 46px rgba(90, 200, 255, 0.7))
                    drop-shadow(0 12px 18px rgba(0, 0, 0, 0.55));
            }
        }

        /* Spell-hint overlaid on the ghost: the move it will play this round.
           Just the sprite (no frame) — the icon is the element's background, set via
           the --hint-icon custom property in JS. */
        .ghost-move-hint {
            position: absolute;
            right: 5%;
            bottom: 4%;
            z-index: 4;
            width: 25%;
            max-width: 54px;
            aspect-ratio: 1 / 1;
            background-image: var(--hint-icon, none);
            background-repeat: no-repeat;
            background-position: center;
            background-size: contain;
            /* Plain icon by default (the Wild Wraith in run 1): just a legibility shadow,
               native block colors, no spectral treatment. */
            filter: drop-shadow(0 1px 3px rgba(0, 0, 0, 0.55));
            pointer-events: none;
        }

        .ghost-move-hint[hidden] {
            display: none;
        }

        /* Ghost-only spectral treatment (your own ghost's replay): strip the block's
           native color, re-tint to spectral blue, add a cyan aura, and fade slightly.
           The Wild Wraith keeps the plain icon above. */
        #game-world.official-ghost .ghost-move-hint {
            filter:
                grayscale(1) sepia(1) hue-rotate(168deg) saturate(4.5) brightness(1.05)
                drop-shadow(0 0 6px rgba(120, 220, 255, 0.95))
                drop-shadow(0 0 13px rgba(120, 220, 255, 0.6));
            opacity: 0.8;
        }

        /* A light beam that sweeps across the icon every 4s (ghost only). The gradient
           slides via background-position (mask stays put), and the mask is the icon
           itself, so the shine only runs over the sprite shape — never the transparent box. */
        #game-world.official-ghost .ghost-move-hint::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(115deg,
                transparent 38%,
                rgba(255, 255, 255, 0.9) 50%,
                transparent 62%);
            background-size: 260% 100%;
            background-repeat: no-repeat;
            background-position: -60% 0;
            -webkit-mask-image: var(--hint-icon, none);
            mask-image: var(--hint-icon, none);
            -webkit-mask-repeat: no-repeat;
            mask-repeat: no-repeat;
            -webkit-mask-position: center;
            mask-position: center;
            -webkit-mask-size: contain;
            mask-size: contain;
            pointer-events: none;
            animation: hint-shine 4s ease-in-out infinite;
        }

        @keyframes hint-shine {
            0%   { background-position: -60% 0; }
            18%  { background-position: 160% 0; }
            100% { background-position: 160% 0; }
        }

        .status-row {
            position: absolute;
            top: 4px;
            display: flex;
            gap: 6px;
            min-height: 26px;
        }

        .status-chip {
            display: grid;
            place-items: center;
            min-width: 28px;
            height: 26px;
            padding: 0 7px;
            border: 1px solid rgba(255, 255, 255, 0.38);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.58);
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-chip.shield {
            border-color: #78b3ff;
            background: rgba(47, 112, 210, 0.38);
        }

        .status-chip.cancel {
            border-color: #8ee7ff;
            background: rgba(33, 168, 205, 0.38);
        }

        .versus {
            position: relative;
            align-self: center;
            justify-self: center;
            width: 72px;
            height: 72px;
            display: grid;
            place-items: center;
            /* No circle frame behind the center icon — just the image + the callouts. */
        }

        .versus img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 8px rgba(217, 184, 92, 0.4));
        }

        /* Move callouts that pop above (player) / below (ghost) the VS bubble.
           Absolutely positioned so the VS bubble itself never moves. */
        .vs-callout {
            position: absolute;
            left: 50%;
            transform: translate(-50%, 0) scale(0);
            width: max-content;
            max-width: 42vw;
            padding: 5px 13px;
            border-radius: 999px;
            border: 1px solid rgba(217, 184, 92, 0.5);
            background: rgba(5, 4, 10, 0.82);
            font-size: 19px;
            font-weight: 800;
            letter-spacing: 0.07em;
            white-space: nowrap;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
            opacity: 0;
            pointer-events: none;
            z-index: 6;
        }

        .vs-callout-top {
            bottom: calc(100% + 10px); /* player's move, sits above the bubble */
            color: #ffe7b0;
        }

        .vs-callout-bottom {
            top: calc(100% + 10px); /* ghost's move, sits below the bubble */
            color: #d6c4ff;
            border-color: rgba(168, 130, 255, 0.55);
        }

        .vs-callout.show {
            animation: jellyJumpIn 460ms cubic-bezier(0.18, 0.89, 0.32, 1.28) forwards;
        }

        .vs-callout.hide {
            animation: jellyJumpOut 300ms cubic-bezier(0.6, -0.28, 0.74, 0.05) forwards;
        }

        @keyframes jellyJumpIn {
            0%   { opacity: 0; transform: translate(-50%, 6px) scale(0.3, 0.3); }
            40%  { opacity: 1; transform: translate(-50%, -3px) scale(1.18, 0.82); }
            65%  { transform: translate(-50%, 0) scale(0.9, 1.12); }
            82%  { transform: translate(-50%, 0) scale(1.05, 0.96); }
            100% { opacity: 1; transform: translate(-50%, 0) scale(1, 1); }
        }

        @keyframes jellyJumpOut {
            0%   { opacity: 1; transform: translate(-50%, 0) scale(1, 1); }
            30%  { opacity: 1; transform: translate(-50%, 0) scale(1.14, 0.84); }
            100% { opacity: 0; transform: translate(-50%, 4px) scale(0.2, 0.2); }
        }

        /* Reusable jelly squash — scale only, no baked-in translate, so it composes
           on any element regardless of how it's centred (unlike jellyJumpIn/Out, whose
           translate(-50%) is welded into every keyframe for the left:50% callouts). */
        @keyframes jellyPop {
            0%   { transform: scale(0.3, 0.3); }
            40%  { transform: scale(1.18, 0.82); }
            65%  { transform: scale(0.9, 1.12); }
            82%  { transform: scale(1.05, 0.96); }
            100% { transform: scale(1, 1); }
        }

        @keyframes jellyPopOut {
            0%   { transform: scale(1, 1); }
            30%  { transform: scale(1.14, 0.84); }
            100% { transform: scale(0.2, 0.2); opacity: 0; }
        }

        /* Big combo "shout": grows live over the grid/battlefield seam as you trace a
           combo, then flies up/down to the VS slot showing the total. OUTER positions
           and flies; INNER carries the text and takes the jelly pops. */
        .combo-shout {
            position: absolute;
            left: 50%;
            top: var(--battle-height);
            transform: translate(-50%, -50%);
            transform-origin: center;
            z-index: 7;
            pointer-events: none;
            opacity: 0;
            font-weight: 900;
            font-size: clamp(38px, 12vw, 78px);
            line-height: 1;
            letter-spacing: 0.5px;
            color: var(--shout-color, #fff);
            white-space: nowrap;
            transition: transform 460ms cubic-bezier(0.18, 0.89, 0.32, 1.28),
                        font-size 460ms ease,
                        opacity 200ms ease;
        }

        .combo-shout.show { opacity: 1; }

        .combo-shout-text { display: inline-block; }
        /* The jelly jump fires ONLY on the number span (×N / total) — the word never bounces. */
        .shout-name, .shout-num {
            display: inline-block;
            /* Cartoon dark outline + SOLID drop shadow below (no blur). em units so both keep
               their proportion as the shout shrinks on its flight to the VS slot. The shadow
               offset is larger than the stroke width on purpose, so the hard shadow peeks out
               below the thick outline instead of hiding behind it. paint-order draws the stroke
               BEHIND the fill, or it would eat the letters. */
            -webkit-text-stroke: 0.1em #1d1d1d;
            paint-order: stroke fill;
            text-shadow: 0 0.14em 0 #1d1d1d;
        }
        .shout-name:not(:empty) + .shout-num { margin-left: 0.22em; }
        .shout-num.pop { animation: jellyPop 420ms cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        .combo-shout-text.out { animation: jellyPopOut 280ms cubic-bezier(0.6, -0.28, 0.74, 0.05) forwards; }

        /* Victory transition: just a big centered word, styled like the combo shout (same
           font size + the .shout-name dark outline/solid shadow), in ghost blue with the same
           spectral cyan glow the player's art gets when it becomes the ghost. No background;
           it auto-dismisses on its own animation. */
        .victory-shout {
            position: absolute;
            left: 50%;
            top: 50%;
            z-index: 20;
            transform: translate(-50%, -50%);
            pointer-events: none;
            text-align: center;
            max-width: min(88vw, 620px);
            font-weight: 900;
            font-size: clamp(38px, 12vw, 78px);
            line-height: 1.1;
            letter-spacing: 0.5px;
            color: #288cdc;
            animation: victoryShout 2600ms ease forwards,
                       ghostTextGlow 3.2s ease-in-out infinite;
        }
        /* A full phrase (not a single combo word) — let it wrap and stay centered. */
        .victory-shout .shout-name { display: inline; }

        /* Scale/fade in, hold, then drift up and out — same beats as the old win banner. */
        @keyframes victoryShout {
            0%   { opacity: 0; transform: translate(-50%, -42%) scale(0.86); }
            14%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            78%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -58%) scale(0.97); }
        }

        /* Breathing cyan halo — the drop-shadow part of the ghost art's spectral glow (the
           grayscale/sepia tint is omitted so it never desaturates the blue text). */
        @keyframes ghostTextGlow {
            0%, 100% {
                filter:
                    drop-shadow(0 0 8px rgba(150, 235, 255, 1))
                    drop-shadow(0 0 18px rgba(120, 220, 255, 0.8))
                    drop-shadow(0 0 32px rgba(90, 200, 255, 0.5));
            }
            50% {
                filter:
                    drop-shadow(0 0 12px rgba(170, 240, 255, 1))
                    drop-shadow(0 0 26px rgba(120, 220, 255, 0.95))
                    drop-shadow(0 0 46px rgba(90, 200, 255, 0.7));
            }
        }

        #effect-layer {
            position: absolute;
            z-index: 5;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        #grid-zone {
            /* Transparent: the global drifting pattern now lives on #game-world::before
               (ported from HOC/DungeonBend; tile baked into --zone-pattern-image). */
            position: relative;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            min-height: 0;
            padding: 8px 12px 12px;
            background: transparent;
        }

        /* tile is 1624x762 -> vertical period / horizontal period = 762/1624 = 0.469211,
           so one full horizontal tile of drift advances exactly one vertical period: seamless. */
        @keyframes zone-pattern-drift {
            from { background-position: 0 0; }
            to { background-position: var(--pattern-tile-w) calc(var(--pattern-tile-w) * 0.469211); }
        }

        /* Single turn indicator above the grid. Same width as the board and centered,
           so with text-align:left its text starts exactly at the grid's left edge. */
        .turn-status {
            width: var(--board-w);
            max-width: 100%;
            margin: 0 auto 7px;
            min-height: 34px;
            display: flex;
            align-items: center;
            color: #f5e9c8;
            font-size: 19px;
            text-align: left;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.88);
        }


        #grid-shell {
            min-height: 0;
            display: grid;
            place-items: center;
        }

        #grid-container {
            --grid-size: 6;
            display: grid;
            grid-template-columns: repeat(var(--grid-size), minmax(0, 1fr));
            grid-template-rows: repeat(var(--grid-size), minmax(0, 1fr));
            gap: var(--tile-gap);
            width: var(--board-w);
            max-width: 100%;
            aspect-ratio: 1 / 1;
            padding: 8px;
            border: 1px solid rgba(217, 184, 92, 0.5);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.36);
            box-shadow: inset 0 0 28px rgba(0, 0, 0, 0.44), 0 10px 26px rgba(0, 0, 0, 0.35);
            touch-action: none;
            position: relative;
        }

        #grid-container.locked {
            opacity: 0.72;
            pointer-events: none;
        }

        .tile {
            position: relative;
            min-width: 0;
            min-height: 0;
            display: grid;
            place-items: center;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            overflow: hidden;
            padding: 0;
            transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease, opacity 160ms ease;
            touch-action: none;
        }

        .tile::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.12), rgba(255, 255, 255, 0));
            pointer-events: none;
        }

        .tile img {
            width: 92%;
            height: 92%;
            object-fit: contain;
            pointer-events: none;
        }

        .tile-fallback {
            position: relative;
            z-index: 1;
            color: #ffffff;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.7);
        }

        .tile.sword {
            background: linear-gradient(180deg, rgba(136, 34, 46, 0.78), rgba(68, 18, 29, 0.78));
        }

        .tile.heart {
            background: linear-gradient(180deg, rgba(164, 57, 122, 0.78), rgba(79, 26, 66, 0.78));
        }

        .tile.shield {
            background: linear-gradient(180deg, rgba(52, 98, 166, 0.78), rgba(25, 45, 88, 0.78));
        }

        .tile.ice {
            background: linear-gradient(180deg, rgba(38, 150, 175, 0.78), rgba(20, 70, 90, 0.78));
        }

        .tile.selected {
            z-index: 2;
            border-color: #ffe28c;
            box-shadow: 0 0 0 2px rgba(255, 226, 140, 0.72), 0 0 16px rgba(255, 226, 140, 0.72);
            transform: scale(1.04);
        }

        .tile.invalid {
            border-color: #ff6873;
            box-shadow: 0 0 0 2px rgba(255, 88, 99, 0.68), 0 0 16px rgba(255, 88, 99, 0.62);
        }

        .tile.removing {
            opacity: 0;
            transform: scale(0.68);
        }

        /* Ghost selection replay: black out the live board, paint only the ghost's saved cells. */
        #grid-container.ghost-replay {
            opacity: 1; /* override #grid-container.locked { opacity: .72 } during the replay */
            background: #000;
        }

        .tile.ghost-black {
            background: #000;
            border-color: rgba(255, 255, 255, 0.06);
            cursor: default;
        }

        .tile.ghost-black::before {
            display: none; /* kill the white sheen on the black cells */
        }

        .ghost-replay-banner {
            position: absolute;
            top: 10px;
            left: 12px;
            right: 12px;
            z-index: 4;
            text-align: center;
            font-size: 19px;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: rgba(214, 196, 255, 0.96);
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.85);
            pointer-events: none;
        }

        /* Selection trail: one reused SVG with two polylines (bright line + faux glow).
           pointer-events:none so it never interferes with tile hit-testing. */
        .trail-overlay {
            position: absolute;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            overflow: visible;
        }

        .trail-overlay .trail-line,
        .trail-overlay .trail-glow {
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .trail-overlay .trail-glow {
            stroke: rgba(255, 226, 140, 0.26);
        }

        .trail-overlay .trail-line {
            stroke: rgba(255, 241, 195, 0.92);
        }

        .trail-overlay.invalid .trail-glow {
            stroke: rgba(255, 88, 99, 0.26);
        }

        .trail-overlay.invalid .trail-line {
            stroke: rgba(255, 142, 148, 0.95);
        }

        /* Ghost-tinted trail (reuses .trail-overlay geometry/structure). */
        .trail-overlay.ghost .trail-glow {
            stroke: rgba(168, 130, 255, 0.30);
        }

        .trail-overlay.ghost .trail-line {
            stroke: rgba(208, 188, 255, 0.95);
        }

        .hint-bar {
            width: min(900px, 100%);
            margin: 7px auto 0;
            color: #d7caa3;
            font-size: 16px;
            line-height: 1.2;
            text-align: center;
        }

        .effect-projectile {
            position: absolute;
            left: 0;
            top: 0;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ff4b4b;
            box-shadow: 0 0 18px #ff4b4b;
            transform: translate(-50%, -50%);
            transition: transform 420ms ease;
        }

        .effect-projectile.ice {
            background: #8beaff;
            box-shadow: 0 0 20px #70e2ff;
        }

        .effect-burst {
            position: absolute;
            left: 0;
            top: 0;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: burst 520ms ease forwards;
        }

        .effect-burst.hit {
            border: 3px solid rgba(255, 86, 86, 0.9);
            box-shadow: 0 0 26px rgba(255, 50, 50, 0.75);
        }

        .effect-burst.block {
            border: 3px solid rgba(112, 181, 255, 0.94);
            box-shadow: 0 0 30px rgba(112, 181, 255, 0.9);
        }

        .effect-burst.ice {
            border: 3px solid rgba(139, 234, 255, 0.94);
            box-shadow: 0 0 30px rgba(139, 234, 255, 0.9);
        }

        .effect-shield {
            position: absolute;
            left: 0;
            top: 0;
            width: 160px;
            height: 160px;
            border: 4px solid rgba(112, 181, 255, 0.88);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(83, 157, 255, 0.32), transparent 68%);
            transform: translate(-50%, -50%);
            animation: shieldRise 620ms ease forwards;
        }

        .effect-heal {
            position: absolute;
            left: 0;
            top: 0;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ff86ce;
            box-shadow: 0 0 14px #ff86ce;
            animation: healFloat 900ms ease forwards;
        }

        .soul {
            position: absolute;
            left: 0;
            top: 0;
            width: 26px;
            height: 34px;
            border-radius: 50% 50% 45% 45%;
            background: radial-gradient(circle at 50% 35%, #d6f7ff, #4ecaf1 42%, rgba(48, 122, 228, 0.32) 74%);
            box-shadow: 0 0 20px rgba(108, 226, 255, 0.9);
            transform: translate(-50%, -50%);
            animation: soulMove 1400ms ease forwards;
        }

        .ghost-form {
            position: absolute;
            left: 0;
            top: 0;
            width: 120px;
            height: 160px;
            border-radius: 50% 50% 40% 40%;
            background: radial-gradient(circle at 50% 35%, rgba(219, 250, 255, 0.95), rgba(91, 211, 246, 0.72) 42%, rgba(49, 132, 225, 0.18) 76%);
            box-shadow: 0 0 36px rgba(108, 226, 255, 0.92);
            transform: translate(-50%, -50%) scale(0.6);
            animation: ghostForm 1200ms ease forwards;
        }

        .character-img.hit-shake {
            animation: hitShake 280ms ease;
        }

        .character-img.heal-pulse {
            animation: healPulse 520ms ease;
        }

        #game-over-screen {
            position: absolute;
            z-index: 30;
            inset: 0;
            display: none;
            place-items: center;
            padding: 24px;
            background: rgba(0, 0, 0, 0.78);
        }

        #game-over-screen.visible {
            display: grid;
        }

        .game-over-content {
            width: min(500px, 92vw);
            padding: 24px;
            border: 2px solid rgba(217, 184, 92, 0.78);
            border-radius: 8px;
            background: rgba(15, 10, 24, 0.96);
            color: #fff8de;
            text-align: center;
            box-shadow: 0 0 36px rgba(0, 0, 0, 0.72);
        }

        #game-over-title {
            margin: 0 0 12px;
            font-size: 43px;
        }

        #game-over-title.victory {
            color: #98ffbc;
        }

        #game-over-title.defeat {
            color: #ff8088;
        }

        #game-over-stats {
            margin-bottom: 18px;
            color: #e5d7b7;
            line-height: 1.6;
            font-size: 20px;
        }

        .game-button {
            min-height: 44px;
            min-width: 150px;
            padding: 10px 18px;
            border: 2px solid #8e7228;
            border-radius: 8px;
            background: linear-gradient(180deg, #f0ca64, #b98d2c);
            color: #17101f;
            cursor: pointer;
            font-weight: 700;
        }

        .game-button:active {
            transform: translateY(1px);
        }

        @keyframes burst {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.45);
            }
            35% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.35);
            }
        }

        @keyframes shieldRise {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.55);
            }
            35% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.15);
            }
        }

        @keyframes healFloat {
            0% {
                opacity: 0;
                transform: translate(-50%, 20px) scale(0.8);
            }
            25% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(var(--heal-x), -80px) scale(0.2);
            }
        }

        @keyframes soulMove {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.55);
            }
            18% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(var(--soul-x), var(--soul-y)) scale(0.18);
            }
        }

        @keyframes ghostForm {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.6);
            }
            40% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.1);
            }
        }

        @keyframes hitShake {
            0%, 100% {
                transform: scaleX(var(--flip)) translateX(0);
            }
            25% {
                transform: scaleX(var(--flip)) translateX(-8px);
            }
            75% {
                transform: scaleX(var(--flip)) translateX(8px);
            }
        }

        @keyframes healPulse {
            0%, 100% {
                transform: scaleX(var(--flip)) scale(1);
            }
            45% {
                transform: scaleX(var(--flip)) scale(1.06);
                filter: drop-shadow(0 0 22px rgba(255, 134, 206, 0.9));
            }
        }

        /* --- Feedback & timing layer (additive only) --- */
        .effect-shield.held {
            animation: shieldHold 1300ms ease-in-out infinite;
        }

        @keyframes shieldHold {
            0%, 100% {
                opacity: 0.85;
                transform: translate(-50%, -50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.06);
            }
        }

        .effect-shield.shield-shatter {
            animation: shieldShatter 420ms ease forwards;
        }

        @keyframes shieldShatter {
            0% {
                opacity: 1;
                border-width: 4px;
                transform: translate(-50%, -50%) scale(1.06);
            }
            30% {
                opacity: 1;
                border-width: 7px;
                transform: translate(-50%, -50%) scale(1.22);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(1.55);
            }
        }

        .combatant.frozen .character-img {
            filter: drop-shadow(0 0 16px rgba(139, 234, 255, 0.95)) brightness(1.12) saturate(1.45) hue-rotate(150deg);
            animation: frozenShiver 600ms ease;
        }

        @keyframes frozenShiver {
            0%, 100% { transform: scaleX(var(--flip)) translateX(0); }
            20% { transform: scaleX(var(--flip)) translateX(-3px); }
            40% { transform: scaleX(var(--flip)) translateX(3px); }
            60% { transform: scaleX(var(--flip)) translateX(-2px); }
            80% { transform: scaleX(var(--flip)) translateX(2px); }
        }

        .float-text {
            position: absolute;
            left: 0;
            top: 0;
            z-index: 6;
            font-size: 34px;
            font-weight: 700;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.9);
            pointer-events: none;
            transform: translate(-50%, -50%);
            animation: floatUp 1000ms ease forwards;
        }

        .float-text.dmg {
            color: #ff6b5f;
            animation-duration: 1500ms;
        }

        .float-text.heal {
            color: #ff9ad6;
            animation-duration: 1500ms;
        }

        .float-text.shield {
            color: #6fc0ff;
        }

        @keyframes floatUp {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.6);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -90%) scale(1.12);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -150%) scale(1);
            }
        }

        .turn-status.reveal {
            animation: cardPop 450ms ease;
            transform-origin: left center; /* grow from the left edge so it stays aligned */
        }

        @keyframes cardPop {
            0% { transform: scale(1); }
            40% {
                transform: scale(1.12);
                filter: drop-shadow(0 0 10px rgba(255, 226, 140, 0.85));
            }
            100% { transform: scale(1); }
        }

        @media (max-width: 720px), (max-height: 660px) {
            #game-world {
                --battle-height: 39dvh;
                --tile-gap: 4px;
                --board-w: min(94vw, max(238px, calc(100dvh - var(--battle-height) - 76px)), 760px);
                grid-template-rows: minmax(206px, var(--battle-height)) minmax(0, 1fr);
            }

            .battle-top {
                grid-template-columns: 1fr;
                gap: 5px;
                padding: 8px 10px 0;
            }

            .game-title {
                display: none;
            }

            .combat-row {
                inset: 40px 0 0;
                grid-template-columns: minmax(108px, 1fr) 42px minmax(108px, 1fr);
                padding: 0 8px 6px;
            }

            .versus {
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            .hp-panel {
                width: min(170px, 44vw);
                margin-bottom: 8px;
                padding: 5px;
            }

            .name-row {
                font-size: 14px;
            }

            .character-wrap {
                width: min(44vw, 200px);
                height: min(27dvh, 220px);
                min-width: 118px;
                min-height: 150px;
            }

            #grid-zone {
                padding: 6px 8px 8px;
            }

            .hint-bar {
                font-size: 14px;
            }

            #grid-container {
                width: var(--board-w);
                padding: 5px;
            }
        }

        /* Large PORTRAIT surfaces (e.g. the Astrocade platform iframe at 720x1280).
           Phones and the ~512px local preview are < 600px wide, so they are
           untouched — only large portrait viewports get the battle area scaled up
           so the characters/VS/HP fill the tall battlefield instead of hugging
           the bottom with empty space above. */
        @media (min-width: 600px) and (orientation: portrait) {
            .combat-row {
                inset: 44px 0 0;
                padding: 0 2vw 16px;
                grid-template-columns: minmax(0, 1fr) minmax(70px, 13vw) minmax(0, 1fr);
                gap: 4px;
            }

            .hp-panel {
                width: min(40vw, 280px);
                margin-bottom: 10px;
            }

            .name-row {
                font-size: 20px;
            }

            .round-banner {
                font-size: 22px;
            }

            .turn-status {
                font-size: 23px;
            }

            .hp-track {
                height: 26px;
            }

            /* Square wrap matched to the square (512x512) sprite so it fills with no
               empty band. max-width:none lifts the base 190px cap that was the real
               size limiter; width is held just under the side-column width so two
               characters + the VS icon span the full 720px without overflowing. */
            .character-wrap {
                width: min(40vw, 285px);
                max-width: none;
                height: min(34dvh, 285px);
                min-width: 0;
                min-height: 0;
            }

            /* The sprite normally renders at its intrinsic size (only max-capped),
               so a bigger wrap left it stranded at the bottom. Force it to fill the
               wrap so the character actually grows into the space. */
            .character-img {
                width: 100%;
                height: 100%;
                object-position: center bottom;
            }

            .versus {
                width: min(13vw, 96px);
                height: min(13vw, 96px);
            }

            .vs-callout {
                font-size: 22px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                transition-duration: 1ms !important;
            }
        }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div id="loading-word"><span style="animation-delay:0s">l</span><span style="animation-delay:.07s">o</span><span style="animation-delay:.14s">a</span><span style="animation-delay:.21s">d</span><span style="animation-delay:.28s">i</span><span style="animation-delay:.35s">n</span><span style="animation-delay:.42s">g</span><span style="animation-delay:.49s">.</span><span style="animation-delay:.56s">.</span><span style="animation-delay:.63s">.</span></div>
        <div id="loading-pct">0%</div>
    </div>
    <div id="game-world">
        <section id="battlefield">
            <div class="battle-top">
                <!-- Game title removed. Round indicator lives here (top-left). The old
                     #round-status combat-narration line was removed (always empty). -->
                <div class="round-banner" id="round-counter">Round 1</div>
            </div>

            <div class="combat-row">
                <div class="combatant player-side" id="player-combatant">
                    <div class="hp-panel">
                        <div class="name-row">
                            <span>Player</span>
                            <span id="player-hp-text">40 / 40</span>
                        </div>
                        <div class="hp-track"><div class="hp-fill" id="player-hp-bar"></div><div class="shield-fill" id="player-shield-bar"></div></div>
                    </div>
                    <div class="character-wrap">
                        <div class="status-row" id="player-status"></div>
                        <div class="shield-badge" id="player-shield-text" aria-hidden="true"></div>
                        <img class="character-img" id="player-img" alt="Player">
                    </div>
                </div>

                <div class="versus">
                    <div class="vs-callout vs-callout-top" id="vs-player-callout" aria-hidden="true"></div>
                    <img id="vs-icon" alt="Battle">
                    <div class="vs-callout vs-callout-bottom" id="vs-ghost-callout" aria-hidden="true"></div>
                </div>

                <div class="combatant ghost-side" id="ghost-combatant">
                    <div class="hp-panel">
                        <div class="name-row">
                            <span id="opponent-name">Opponent</span>
                            <span id="ghost-hp-text">40 / 40</span>
                        </div>
                        <div class="hp-track"><div class="hp-fill" id="ghost-hp-bar"></div><div class="shield-fill" id="ghost-shield-bar"></div></div>
                    </div>
                    <div class="character-wrap">
                        <div class="status-row" id="ghost-status"></div>
                        <div class="shield-badge" id="ghost-shield-text" aria-hidden="true"></div>
                        <img class="character-img" id="ghost-img" alt="Opponent">
                        <!-- Hint: the spell the ghost will play this round, overlaid bottom-right. -->
                        <div class="ghost-move-hint" id="ghost-move-hint" aria-hidden="true"></div>
                    </div>
                </div>
            </div>

            <div id="effect-layer"></div>
        </section>

        <section id="grid-zone">
            <div class="turn-status" id="turn-status">Player turn: waiting</div>
            <div id="grid-shell">
                <div id="grid-container" aria-label="Match grid"></div>
            </div>
            <div class="hint-bar" id="hint-bar"></div>
        </section>

        <div id="game-over-screen">
            <div class="game-over-content">
                <h2 id="game-over-title">Victory</h2>
                <div id="game-over-stats"></div>
                <button class="game-button" id="play-again-btn" type="button">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        const LOCAL_ASSET_URLS = {
            necromancer_player: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782616522417_01KW63JZNHR19GNFMTRZTASPJH.w_necromancer_player.webp",
            necromancer_stone: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782634809614_01KW6N128E5F3GSGWFN9YTAWKE.w_necromancer_stone.webp",
            battlefield_background: "https://d2oir5eh8rty2e.cloudfront.net/assets/images/battlefield_background_604ae7d3-bf7d-47e6-a644-cebbe40d0235.webp",
            icon_trophy: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782567020280_01KW4MC9QR3JYJJ78KKZCNHT30.PictoIcon_Trophy 2.png",
            icon_attack: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782567020394_01KW4MC9VABRFM30HKN8TTDP14.PictoIcon_Attack 2.png",
            icon_boss: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782567020511_01KW4MC9YZEZ1HAJ79BH0W55G3.PictoIcon_Boss 2.png",
            icon_skull: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782567204639_01KW4MHXRZJ4VPNPM5ZBD1VPMZ.PictoIcon_Skull 2.png",
            icon_shield: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782567204777_01KW4MHXX94D6RSWX9JDPGWNYY.PictoIcon_Shield 2.png",
            icon_health: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782567204890_01KW4MHY0TYE7RSS444J4V66J4.PictoIcon_Health 2.png",
            icon_card: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782567287239_01KW4MMEE7JBYRCGSCVTJWHWM2.PictoIcon_Card 2.png",
            icon_critical: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782567287378_01KW4MMEJJABK9QS5X0VNHXK89.PictoIcon_Critical 2.png",
            icon_battle: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782575359125_01KW4WAS4NHQNEB134B1SN1NZ5.ItemIcon_Battle.png",
            block_sword: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782632841244_01KW6K500W6MDXH7ES0MTMCJXD.w_block_sword.webp",
            block_heart: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782632399899_01KW6JQH0A8PRHM0WN5451XNDT.w_block_heart.webp",
            block_shield: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782632841066_01KW6K4ZVA48ZSQDF136GF6HXX.w_block_shield.webp",
            block_ice: "https://dzmv1mxivz48k.cloudfront.net/images/Google_113242356021018268697/1782632411826_01KW6JQWNJJA0TFBNFJQYKAQ2S.w_block_ice.webp",
            sword_attack_sfx: "https://d2oir5eh8rty2e.cloudfront.net/assets/sounds/effect/sword_attack_sfx_ce773fbf-1143-47d3-8fba-502203930999.mp3",
            heal_sfx: "https://d2oir5eh8rty2e.cloudfront.net/assets/sounds/effect/heal_sfx_d93650fd-2951-4457-908b-b9d9e8419ea3.mp3",
            shield_sfx: "https://d2oir5eh8rty2e.cloudfront.net/assets/sounds/effect/shield_sfx_1a25d87b-de73-4c46-ac8a-08cebfb837cf.mp3",
            ice_freeze_sfx: "https://d2oir5eh8rty2e.cloudfront.net/assets/sounds/effect/ice_freeze_sfx_fd511a28-f2bd-44c6-aa32-d47e78bf33d2.mp3",
            block_select_sfx: "https://d2oir5eh8rty2e.cloudfront.net/assets/sounds/effect/block_select_sfx_ac087039-02ba-4472-9b65-67de8ea0a45c.mp3",
            block_match_sfx: "https://d2oir5eh8rty2e.cloudfront.net/assets/sounds/effect/block_match_sfx_cd1722f8-40ea-4901-a581-0915b1700991.mp3",
            ghost_victory_sfx: "https://d2oir5eh8rty2e.cloudfront.net/assets/sounds/effect/ghost_victory_sfx_f64b6620-a035-47b4-95c3-93fb84bd3b72.mp3",
            defeat_sfx: "https://d2oir5eh8rty2e.cloudfront.net/assets/sounds/effect/defeat_sfx_e5bcc56f-111e-42fe-82ad-02811585c76b.mp3"
        };

        function installLocalAstrocadeFallback() {
            if (window.lib) return;
            window.lib = {
                getAsset(id) {
                    return LOCAL_ASSET_URLS[id] ? { url: LOCAL_ASSET_URLS[id], type: id.includes("_sfx") || id.includes("music") ? "audio" : "image" } : undefined;
                },
                async getUserGameState() {
                    try {
                        const raw = localStorage.getItem("necromancers-clash-state");
                        return { state: raw ? JSON.parse(raw) : null };
                    } catch (error) {
                        return { state: null };
                    }
                },
                async saveUserGameState(state) {
                    try {
                        localStorage.setItem("necromancers-clash-state", JSON.stringify(state));
                    } catch (error) {}
                    return { success: true, state };
                },
                showGameParameters() {},
                log(message) {
                    console.log(message);
                }
            };
        }

        async function run(mode) {
            if (window.__necromancersClashStarted) return;
            window.__necromancersClashStarted = true;
            installLocalAstrocadeFallback();

            const BLOCK_TYPES = ["sword", "heart", "shield", "ice"];
            const BLOCK_META = {
                sword: { label: "Sword", short: "ATK", sound: "sword_attack_sfx" },
                heart: { label: "Heart", short: "HEAL", sound: "heal_sfx" },
                shield: { label: "Shield", short: "SHLD", sound: "shield_sfx" },
                ice: { label: "Ice", short: "ICE", sound: "ice_freeze_sfx" }
            };
            // Uppercase names shown in the VS callouts above/below the VS bubble. Tweak freely.
            const COMBAT_CALLOUT = {
                sword: "ATTACK",
                heart: "HEAL",
                shield: "SHIELD",
                ice: "FREEZE"
            };
            const DEFAULT_SETTINGS = {
                startingHP: 40,
                damageMultiplier: 1,
                healMultiplier: 1,
                gridSize: 6,
                blockDistribution: { sword: 25, heart: 25, shield: 25, ice: 25 }
            };
            const DEFAULT_GHOST_ACTIONS = [
                { type: "sword", count: 3, direction: "default" },
                { type: "shield", count: 3, direction: "default" },
                { type: "sword", count: 3, direction: "default" },
                { type: "heart", count: 3, direction: "default" },
                { type: "sword", count: 3, direction: "default" },
                { type: "ice", count: 3, direction: "default" }
            ];

            // =====================================================================
            // ROUND & GHOST-REPLAY TIMING (all values in milliseconds).
            // Edit these freely to tune the pacing. Lower = snappier / faster,
            // higher = more breathing room for the player to digest what happened.
            // =====================================================================
            const TIMING = {
                // After you complete a combo, your matched tiles shrink + fade out over
                // this long before the board refills.
                tileRemoveMs: 220,

                // Pause AFTER your board refills and BEFORE the ghost replay begins.
                // This is the "let my new tiles settle" beat — raise it if the hand-off
                // to the ghost still feels too abrupt.
                boardSettleMs: 600,

                ghost: {
                    // The grid goes black and the "Last run, round x/y" banner shows for
                    // this long BEFORE any of the ghost's tiles are revealed — gives the
                    // player a moment to register that the ghost's move is coming.
                    bannerLeadMs: 700,

                    // Hold after the ghost's FIRST selected tile pops in (before the
                    // trail starts connecting tiles).
                    firstTileMs: 180,

                    // Delay between each subsequent ghost tile as the trail draws itself.
                    // Lower = the trail snakes out faster; higher = slower, more dramatic.
                    perTileMs: 150,

                    // Hold on the COMPLETED ghost selection (full trail visible) so the
                    // player can fully absorb which tiles were picked, before combat fires.
                    // Kept short: the rising select-cadence already draws the eye to the
                    // selection as it traces, so a long static hold here just feels dead.
                    finalHoldMs: 700
                },

                // The "ATTACK ×3" / "ICE ×4" callouts that pop above (player) and below
                // (ghost) the VS bubble. They stay visible through the attack animations and
                // only jelly out at the end of the round.
                callout: {
                    // When the ghost has NO replay to draw (the default wild wraith / legacy
                    // saves), how long both callouts hold before the attacks fire.
                    soloHoldMs: 700
                }
            };

            const world = document.getElementById("game-world");
            const battlefield = document.getElementById("battlefield");
            const effectLayer = document.getElementById("effect-layer");
            const gridZone = document.getElementById("grid-zone");
            const gridContainer = document.getElementById("grid-container");
            const hintBar = document.getElementById("hint-bar");
            const turnStatus = document.getElementById("turn-status");
            const ghostMoveHint = document.getElementById("ghost-move-hint");
            const vsPlayerCallout = document.getElementById("vs-player-callout");
            const vsGhostCallout = document.getElementById("vs-ghost-callout");
            const roundCounter = document.getElementById("round-counter");
            const playerHpText = document.getElementById("player-hp-text");
            const ghostHpText = document.getElementById("ghost-hp-text");
            const playerHpBar = document.getElementById("player-hp-bar");
            const ghostHpBar = document.getElementById("ghost-hp-bar");
            const playerShieldBar = document.getElementById("player-shield-bar");
            const ghostShieldBar = document.getElementById("ghost-shield-bar");
            const playerShieldText = document.getElementById("player-shield-text");
            const ghostShieldText = document.getElementById("ghost-shield-text");
            const playerStatus = document.getElementById("player-status");
            const ghostStatus = document.getElementById("ghost-status");
            const playerImg = document.getElementById("player-img");
            const ghostImg = document.getElementById("ghost-img");
            const opponentName = document.getElementById("opponent-name");
            const playerCombatant = document.getElementById("player-combatant");
            const ghostCombatant = document.getElementById("ghost-combatant");
            const gameOverScreen = document.getElementById("game-over-screen");
            const gameOverTitle = document.getElementById("game-over-title");
            const gameOverStats = document.getElementById("game-over-stats");
            const playAgainBtn = document.getElementById("play-again-btn");

            // Big combo "shout" overlay state (see the shout module below). Declared here so
            // the early startNewMatch() -> clearVsCallouts() at boot can safely touch it.
            const TYPE_COLOR = { sword: "#ff6b5f", heart: "#ff9ad6", shield: "#1668E2", ice: "#4cd6ef" };
            const shouts = {}; // side -> { outer, inner, state: 'idle'|'live'|'settled', count }

            window.gameConfig = window.gameConfig || {};
            window.gameConfig.settings = mergeSettings(DEFAULT_SETTINGS, window.gameConfig.settings || {});
            const settings = window.gameConfig.settings;
            const gridSize = clamp(Number(settings.gridSize) || 6, 5, 7);
            settings.gridSize = gridSize;
            gridContainer.style.setProperty("--grid-size", String(gridSize));

            const loadingOverlay = document.getElementById("loading-overlay");
            const loadingPct = document.getElementById("loading-pct");
            const assetUrls = collectAssetUrls();
            await loadCoreImages(assetUrls, (done, total) => {
                if (loadingPct) loadingPct.textContent = Math.round(done / total * 100) + "%";
            });
            applyVisualAssets(assetUrls);
            const vsIcon = document.getElementById("vs-icon");
            if (vsIcon && assetUrls.icon_battle) {
                vsIcon.src = assetUrls.icon_battle;
            } else if (vsIcon) {
                vsIcon.style.display = "none";
                const label = document.createElement("span");
                label.className = "versus-label";
                label.textContent = "VS";
                vsIcon.parentNode.appendChild(label);
            }
            buildZonePattern(assetUrls);
            registerParameters();

            let grid = createPlayableGrid();
            let player = { hp: settings.startingHP, maxHp: settings.startingHP, shield: 0 };
            let ghost = { hp: settings.startingHP, maxHp: settings.startingHP, shield: 0 };
            let activeGhostActions = DEFAULT_GHOST_ACTIONS.slice();
            let ghostActionIndex = 0;
            let currentRunActions = [];
            let startedWithoutOfficialGhost = true;
            let opponentLabel = "Opponent";
            let opponentIsOfficialGhost = false;
            let roundNumber = 1;
            let damageDealt = 0;
            let healingDone = 0;
            let selection = null;
            let selectionIsValid = false;
            // Selection-trail overlay: reused across drags; geometry cached per drag.
            let trailSvg = null;
            let trailGlow = null;
            let trailLine = null;
            let trailGeo = null;
            let ghostReplayCells = []; // cells being revealed during a ghost selection replay
            let ghostBanner = null; // "Last run, round x/y" overlay shown during the replay
            let lastHover = null; // last grid cell processed this drag — skips same-cell churn
            let resolving = false;
            let gameOver = false;
            let editMode = mode === "edit";

            await startNewMatch();

            // Wait until every on-screen image is actually DECODED before lifting the
            // splash. Preloading only warms the HTTP cache; the fresh <img> elements
            // renderGrid creates still need a per-element decode, and that decode is what
            // was landing a frame late and causing the pop-in. Now the board/characters
            // are fully painted underneath the moment the overlay fades.
            await decodeVisibleImages();

            // Everything underneath is painted — drop the splash.
            if (loadingOverlay) {
                loadingOverlay.classList.add("is-done");
                setTimeout(() => loadingOverlay.remove(), 450);
            }

            if (editMode) {
                gridContainer.classList.add("locked");
                hintBar.textContent = "Edit mode preview.";
            } else {
                bindInput();
            }

            // Defeat is terminal, but restarting just re-seeds the scene in place — no page
            // reload, so the already-loaded assets are reused instead of re-fetched.
            playAgainBtn.addEventListener("click", () => {
                startNewMatch();
            });

            // Soft reset: begin the next level in place. Reused both at startup and to continue
            // after a win (auto) or a defeat ("Play Again"). Input is bound once, separately,
            // and gating runs off the gameOver/resolving/locked flags — so this never re-binds.
            async function startNewMatch() {
                grid = createPlayableGrid();
                player = { hp: settings.startingHP, maxHp: settings.startingHP, shield: 0 };
                ghost = { hp: settings.startingHP, maxHp: settings.startingHP, shield: 0 };
                activeGhostActions = DEFAULT_GHOST_ACTIONS.slice();
                ghostActionIndex = 0;
                currentRunActions = [];
                startedWithoutOfficialGhost = true;
                opponentLabel = "Opponent";
                opponentIsOfficialGhost = false;
                roundNumber = 1;
                damageDealt = 0;
                healingDone = 0;
                selection = null;
                selectionIsValid = false;
                resolving = false;
                gameOver = false;

                effectLayer.innerHTML = "";
                clearVsCallouts();
                gridContainer.classList.remove("locked");
                gameOverScreen.classList.remove("visible");

                await loadHistory();
                applyOpponentIdentity();
                renderAll();
                setMessage(editMode ? "Edit Mode" : ""); // top starts clean; combat messages fill it during play
            }

            function mergeSettings(base, override) {
                const merged = {
                    startingHP: override.startingHP ?? base.startingHP,
                    damageMultiplier: override.damageMultiplier ?? base.damageMultiplier,
                    healMultiplier: override.healMultiplier ?? base.healMultiplier,
                    gridSize: override.gridSize ?? base.gridSize,
                    blockDistribution: {
                        sword: override.blockDistribution?.sword ?? base.blockDistribution.sword,
                        heart: override.blockDistribution?.heart ?? base.blockDistribution.heart,
                        shield: override.blockDistribution?.shield ?? base.blockDistribution.shield,
                        ice: override.blockDistribution?.ice ?? base.blockDistribution.ice
                    }
                };
                merged.startingHP = clamp(Number(merged.startingHP) || base.startingHP, 20, 300);
                merged.damageMultiplier = Number(merged.damageMultiplier) || 1;
                merged.healMultiplier = Number(merged.healMultiplier) || 1;
                return merged;
            }

            function collectAssetUrls() {
                const ids = [
                    "necromancer_player",
                    "necromancer_stone",
                    "block_sword",
                    "block_heart",
                    "block_shield",
                    "block_ice",
                    "icon_critical",
                    "icon_skull",
                    "icon_shield",
                    "icon_trophy",
                    "icon_boss",
                    "icon_attack",
                    "icon_card",
                    "icon_health",
                    "icon_battle",
                    "sword_attack_sfx",
                    "heal_sfx",
                    "shield_sfx",
                    "ice_freeze_sfx",
                    "block_select_sfx",
                    "block_match_sfx",
                    "ghost_victory_sfx",
                    "defeat_sfx"
                ];
                // The block art was converted png -> webp; the platform asset_map now
                // keys these under their ".webp" names, so map our logical ids onto them.
                const ASSET_KEY_OVERRIDES = {
                    block_sword: "w_block_sword.webp",
                    block_heart: "w_block_heart.webp",
                    block_shield: "w_block_shield.webp",
                    block_ice: "w_block_ice.webp",
                    necromancer_stone: "w_necromancer_stone.webp"
                };
                const urls = {};
                ids.forEach((id) => {
                    try {
                        const lookupId = ASSET_KEY_OVERRIDES[id] || id;
                        const asset = window.lib && typeof lib.getAsset === "function" ? lib.getAsset(lookupId) : null;
                        urls[id] = asset && asset.url ? asset.url : (LOCAL_ASSET_URLS[id] || "");
                    } catch (error) {
                        urls[id] = "";
                    }
                });
                return urls;
            }

            async function loadCoreImages(urls, onProgress) {
                const imageIds = [
                    "necromancer_player",
                    "necromancer_stone",
                    "block_sword",
                    "block_heart",
                    "block_shield",
                    "block_ice"
                ];
                let done = 0;
                const total = imageIds.length;
                if (onProgress) onProgress(0, total);
                await Promise.all(imageIds.map((id) => preloadImage(urls[id]).then((status) => {
                    // Only drop a genuinely broken asset. A "timeout" means the image is
                    // just slow (e.g. the bigger character sprites on throttled 4G) — keep
                    // its URL so the native <img> still shows it once it finishes loading,
                    // instead of blanking a perfectly valid URL and hiding the sprite.
                    if (status === "error") urls[id] = "";
                    done += 1;
                    if (onProgress) onProgress(done, total);
                })));
            }

            // Resolves once every on-screen image has finished decoding (or failed).
            // decode() is per-<img>, so even cache-warm sprites must decode before they
            // paint cleanly — awaiting this is what makes the board appear fully formed
            // under the splash instead of a frame after it lifts.
            function decodeVisibleImages() {
                const imgs = Array.from(document.querySelectorAll("#game-world img"));
                return Promise.all(imgs.map((img) => {
                    if (!img.getAttribute("src") || typeof img.decode !== "function") return null;
                    return img.decode().catch(() => {});
                }));
            }

            // Resolves "ok" | "error" | "timeout". The timeout only unblocks the start
            // sequence; it must NOT be treated as a load failure.
            function preloadImage(url) {
                if (!url) return Promise.resolve("error");
                return new Promise((resolve) => {
                    const img = new Image();
                    // Generous cap so the loading % stays faithful: on throttled 4G the
                    // heavier sprites (e.g. the ~248KB stone) actually finish before this
                    // fires, instead of being cut off at 2.5s and popping in afterwards.
                    // Still bounded so a genuinely dead CDN asset can't hang the splash.
                    const timer = setTimeout(() => resolve("timeout"), 10000);
                    img.onload = () => {
                        clearTimeout(timer);
                        resolve("ok");
                    };
                    img.onerror = () => {
                        clearTimeout(timer);
                        resolve("error");
                    };
                    img.src = url;
                });
            }

            function applyVisualAssets(urls) {
                // Visual test: no battlefield image — the global drifting pattern
                // (game-world::before) is the only background, continuous behind everything.
                setCharacterImage(playerImg, urls.necromancer_player);
                setCharacterImage(ghostImg, urls.necromancer_stone);
            }

            // Bakes the DungeonBend pictogram tile client-side. That project ships a
            // committed PNG (assets/ui/deck-editor/deck-pattern-tile.png) built by
            // scripts/generate-deck-pattern.py; this single-file build composites the 8
            // icons into the same seamless tile at runtime and feeds it to
            // #grid-zone::before via --zone-pattern-image. KNOBS mirror that script 1:1,
            // so the spacing/offset is identical. Non-blocking: if anything fails the
            // plain gradient just stays.
            function buildZonePattern(urls) {
                const FRAME = 256;           // native icon size (all icons are 256x256)
                const H_GAP = 150;           // horizontal gap -> center-to-center 406
                const V_GAP = 125;           // vertical gap -> row center-to-center 381
                const ROW1_OFFSET = 163;     // row 1 shifted right -> diagonal/brick feel
                const CELL_W = FRAME + H_GAP;     // 406
                const CELL_H = FRAME + V_GAP;     // 381
                // Row 1 (top, offset) then row 2 (flush below), per the requested layout.
                const ROW1 = ["icon_critical", "icon_skull", "icon_shield", "icon_trophy"];
                const ROW2 = ["icon_boss", "icon_attack", "icon_card", "icon_health"];
                const TILE_W = ROW1.length * CELL_W;   // 1624 (seamless horizontally)
                const TILE_H = 2 * CELL_H;             // 762  (seamless vertically)

                const loadIcon = (id) => new Promise((resolve) => {
                    const url = urls[id];
                    if (!url) { resolve(null); return; }
                    const img = new Image();
                    img.crossOrigin = "anonymous";   // CDN sends Access-Control-Allow-Origin:* -> canvas stays untainted
                    const timer = setTimeout(() => resolve(null), 4000);
                    img.onload = () => { clearTimeout(timer); resolve(img); };
                    img.onerror = () => { clearTimeout(timer); resolve(null); };
                    img.src = url;
                });

                const ids = ROW1.concat(ROW2);
                Promise.all(ids.map(loadIcon)).then((imgs) => {
                    if (imgs.some((img) => !img)) return;   // missing icon -> keep clean gradient
                    const byId = {};
                    ids.forEach((id, i) => { byId[id] = imgs[i]; });

                    const canvas = document.createElement("canvas");
                    canvas.width = TILE_W;
                    canvas.height = TILE_H;
                    const ctx = canvas.getContext("2d");
                    if (!ctx) return;

                    // Paste each icon with horizontal+vertical wrap so an icon crossing an
                    // edge reappears on the opposite side -> the tile repeats seamlessly.
                    const place = (img, x, y) => {
                        for (const dx of [-TILE_W, 0, TILE_W]) {
                            for (const dy of [-TILE_H, 0, TILE_H]) {
                                ctx.drawImage(img, x + dx, y + dy, FRAME, FRAME);
                            }
                        }
                    };
                    ROW1.forEach((id, i) => place(byId[id], ROW1_OFFSET + i * CELL_W, 0));
                    ROW2.forEach((id, i) => place(byId[id], i * CELL_W, CELL_H));

                    try {
                        const dataUrl = canvas.toDataURL("image/png");
                        // Set on #game-world so the global ::before pattern layer picks it up.
                        world.style.setProperty("--zone-pattern-image", `url("${dataUrl}")`);
                    } catch (error) {
                        // Tainted canvas (unexpected CORS failure) -> leave gradient unpatterned.
                    }
                });
            }

            function applyOpponentIdentity() {
                opponentName.textContent = opponentLabel;
                ghostImg.alt = opponentLabel;
                world.classList.toggle("official-ghost", opponentIsOfficialGhost);
                // Optimization test: the official ghost reuses the player's own sprite
                // (mirrored + spectral-tinted via CSS) instead of bespoke necromancer_ghost art.
                const opponentSprite = opponentIsOfficialGhost ? assetUrls.necromancer_player : assetUrls.necromancer_stone;
                setCharacterImage(ghostImg, opponentSprite);
            }

            function setCharacterImage(img, url) {
                // No placeholder art: show the sprite, or nothing if it is missing/fails.
                img.onerror = () => {
                    img.hidden = true;
                };
                if (url) {
                    img.hidden = false;
                    img.src = url;
                } else {
                    img.hidden = true;
                    img.removeAttribute("src");
                }
            }

            function registerParameters() {
                if (!window.lib || typeof lib.showGameParameters !== "function") return;
                try {
                    lib.showGameParameters({
                        name: "Game Settings",
                        params: {
                            "Starting HP": { key: "settings.startingHP", type: "slider", min: 20, max: 200, step: 10 },
                            "Damage Multiplier": { key: "settings.damageMultiplier", type: "slider", min: 0.5, max: 2, step: 0.1 },
                            "Heal Multiplier": { key: "settings.healMultiplier", type: "slider", min: 0.5, max: 2, step: 0.1 },
                            "Grid Size": {
                                key: "settings.gridSize",
                                type: "dropdown",
                                options: [
                                    { label: "5x5", value: 5 },
                                    { label: "6x6", value: 6 },
                                    { label: "7x7", value: 7 }
                                ]
                            },
                            "Sword Block %": { key: "settings.blockDistribution.sword", type: "slider", min: 10, max: 40, step: 5 },
                            "Heart Block %": { key: "settings.blockDistribution.heart", type: "slider", min: 10, max: 40, step: 5 },
                            "Shield Block %": { key: "settings.blockDistribution.shield", type: "slider", min: 10, max: 40, step: 5 },
                            "Ice Block %": { key: "settings.blockDistribution.ice", type: "slider", min: 10, max: 40, step: 5 }
                        }
                    });
                } catch (error) {
                    logError("showGameParameters failed", error);
                }
            }

            async function loadHistory() {
                let savedState = null;
                try {
                    if (window.lib && typeof lib.getUserGameState === "function") {
                        const response = await lib.getUserGameState();
                        savedState = response && response.state ? response.state : null;
                    }
                } catch (error) {
                    logError("getUserGameState failed", error);
                }

                const normalized = normalizeSavedState(savedState);
                startedWithoutOfficialGhost = !normalized.hasOfficialGhost;
                if (normalized.hasOfficialGhost) {
                    // You now fight your own ghost: an exact replay of your last winning run.
                    activeGhostActions = normalized.ghostActions;
                    opponentLabel = "Your Ghost";
                    opponentIsOfficialGhost = true;
                    setMessage("You face your own ghost — your last run repeats, move for move.");
                } else {
