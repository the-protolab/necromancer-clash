                    // No history yet: a dormant statue awakens, following the ritual pattern.
                    activeGhostActions = DEFAULT_GHOST_ACTIONS.slice();
                    opponentLabel = "Slumbering Statue";
                    opponentIsOfficialGhost = false;
                    setMessage(`First run: the ${opponentLabel} awakens and attacks. Beat it to forge your ghost.`);
                }
            }

            function normalizeSavedState(state) {
                // Two states only: either there is a saved ghost (your last winning run)
                // or there is not (you face the first-run ritual creature).
                if (!state) {
                    return { ghostActions: [], hasOfficialGhost: false };
                }
                const actions = normalizeActionList(state.ghostActions);
                return {
                    ghostActions: actions,
                    hasOfficialGhost: actions.length > 0
                };
            }

            function normalizeActionList(actions) {
                if (!Array.isArray(actions)) return [];
                return actions.map(normalizeAction).filter(Boolean).slice(0, 120);
            }

            function normalizeAction(action) {
                if (typeof action === "string") {
                    return BLOCK_TYPES.includes(action) ? { type: action, count: 3, direction: "default" } : null;
                }
                if (!action || !BLOCK_TYPES.includes(action.type)) return null;
                // Sanitize replay positions FIRST: drop out-of-bounds (e.g. recorded on a
                // larger grid) and non-finite cells. Omit entirely if fewer than 2 survive
                // (legacy v2 path that stored no cells).
                let cells = null;
                if (Array.isArray(action.cells)) {
                    const sanitized = action.cells
                        .map((c) => ({ row: Number(c && c.row), col: Number(c && c.col) }))
                        .filter((c) => Number.isFinite(c.row) && Number.isFinite(c.col) && inBounds(c.row, c.col));
                    if (sanitized.length >= 2) cells = sanitized;
                }
                // count IS the damage (actionAmount = count * per). A live selection can
                // snake through far more than `gridSize` tiles, so the old clamp-to-gridSize
                // silently nerfed any winning move longer than the board edge — the ghost
                // then under-hit the move it was supposed to replay exactly. When the path
                // survived sanitizing, derive count straight from it so count and the
                // replayed cells can never disagree; otherwise clamp the saved count to a
                // sane board-area ceiling (legacy saves that carry no cells).
                const count = (cells && cells.length >= 3)
                    ? cells.length
                    : clamp(Number(action.count) || 3, 3, gridSize * gridSize);
                const normalized = {
                    type: action.type,
                    count,
                    direction: typeof action.direction === "string" ? action.direction : "default"
                };
                if (cells) normalized.cells = cells;
                return normalized;
            }

            function bindInput() {
                gridContainer.addEventListener("pointerdown", onPointerDown);
                gridContainer.addEventListener("pointermove", onPointerMove);
                gridContainer.addEventListener("pointerup", onPointerUp);
                gridContainer.addEventListener("pointercancel", abortSelection);
                gridContainer.addEventListener("lostpointercapture", () => {
                    if (selection && !resolving) abortSelection();
                });
            }

            function onPointerDown(event) {
                if (resolving || gameOver || editMode) return;
                const tile = event.target.closest(".tile");
                if (!tile || !gridContainer.contains(tile)) return;
                event.preventDefault();
                gridContainer.setPointerCapture(event.pointerId);
                const cell = readCell(tile);
                selection = { pointerId: event.pointerId, anchor: cell, cells: [cell], invalid: false };
                selectionIsValid = false;
                trailGeo = computeTrailGeometry(); // read layout once per drag, not per move
                lastHover = cell;
                ensureShout("player").state = "idle"; // re-arm the big shout for this fresh drag
                updateSelectionMarks();
                playSelectNote(0); // base note of the rising select cadence (anchor tile)
            }

            function onPointerMove(event) {
                if (!selection || event.pointerId !== selection.pointerId || resolving) return;
                event.preventDefault();
                const tile = tileFromPoint(event.clientX, event.clientY);
                if (!tile) return;
                const cell = readCell(tile);
                // Same cell as last move: nothing can change — skip the heavy redraw entirely.
                if (lastHover && lastHover.row === cell.row && lastHover.col === cell.col) return;
                lastHover = cell;
                extendTrail(cell);
                updateSelectionMarks();
            }

            function onPointerUp(event) {
                if (!selection || event.pointerId !== selection.pointerId || resolving) return;
                event.preventDefault();
                try {
                    gridContainer.releasePointerCapture(event.pointerId);
                } catch (error) {
                    /* Pointer capture may already be released by the browser. */
                }

                const finalCells = selection.cells.slice();
                const action = selectionIsValid ? validateSelection(finalCells) : null;
                // Valid -> the big shout flies up to the VS slot with the total; invalid ->
                // it pops out in place. Done before clearSelection() (which leaves the shout
                // alone) so the in-flight shout survives the teardown below.
                releaseShout("player", action);
                if (!action) {
                    flashInvalidSelection();
                    return;
                }
                clearSelection();
                executeRound(finalCells);
            }

            // Aborts with no pointerup (browser-cancelled / lost capture): dismiss the live
            // shout and tear down the selection.
            function abortSelection() {
                releaseShout("player", null);
                clearSelection();
            }

            function tileFromPoint(x, y) {
                const element = document.elementFromPoint(x, y);
                if (!element) return null;
                const tile = element.closest(".tile");
                return tile && gridContainer.contains(tile) ? tile : null;
            }

            function readCell(tile) {
                return {
                    row: Number(tile.dataset.row),
                    col: Number(tile.dataset.col)
                };
            }

            // Free-draw trail selection: the path grows as the pointer passes over
            // touching (8-way) blocks of the same type. Straight lines, L-shapes and
            // zig-zags are all valid, as long as every step touches the previous one.
            function extendTrail(target) {
                const cells = selection.cells;
                const last = cells[cells.length - 1];
                if (target.row === last.row && target.col === last.col) return;

                const firstType = getBlock(cells[0].row, cells[0].col).type;
                const rowDelta = target.row - last.row;
                const colDelta = target.col - last.col;

                if (Math.max(Math.abs(rowDelta), Math.abs(colDelta)) === 1) {
                    tryExtend(target, firstType);
                    return;
                }

                // Fast drag along a straight run: walk the gap one cell at a time so no
                // block is skipped when the finger moves quickly.
                if (rowDelta === 0 || colDelta === 0 || Math.abs(rowDelta) === Math.abs(colDelta)) {
                    const stepRow = Math.sign(rowDelta);
                    const stepCol = Math.sign(colDelta);
                    const steps = Math.max(Math.abs(rowDelta), Math.abs(colDelta));
                    for (let i = 1; i <= steps; i++) {
                        const cell = { row: last.row + stepRow * i, col: last.col + stepCol * i };
                        if (!tryExtend(cell, firstType)) break;
                    }
                }
            }

            function tryExtend(cell, firstType) {
                const cells = selection.cells;
                // Dragging back onto the previous cell undoes the last step.
                if (cells.length >= 2) {
                    const prev = cells[cells.length - 2];
                    if (cell.row === prev.row && cell.col === prev.col) {
                        cells.pop();
                        refreshSelectionValidity();
                        return true;
                    }
                }
                const last = cells[cells.length - 1];
                if (!areAdjacent(last, cell)) return false;
                if (cells.some((c) => c.row === cell.row && c.col === cell.col)) return false;
                const block = getBlock(cell.row, cell.col);
                if (!block || block.type !== firstType) return false;
                cells.push(cell);
                playSelectNote(cells.length - 1); // one rising note per tile genuinely added
                refreshSelectionValidity();
                return true;
            }

            function areAdjacent(a, b) {
                return Math.max(Math.abs(a.row - b.row), Math.abs(a.col - b.col)) === 1;
            }

            function refreshSelectionValidity() {
                selection.invalid = false;
                selectionIsValid = selection.cells.length >= 3;
            }

            function validateSelection(cells) {
                if (!Array.isArray(cells) || cells.length < 3) return null;
                const head = getBlock(cells[0].row, cells[0].col);
                if (!head) return null;
                const type = head.type;
                const seen = new Set();
                for (let i = 0; i < cells.length; i++) {
                    const cell = cells[i];
                    const block = getBlock(cell.row, cell.col);
                    if (!block || block.type !== type) return null;
                    const key = `${cell.row},${cell.col}`;
                    if (seen.has(key)) return null;
                    seen.add(key);
                    if (i > 0 && !areAdjacent(cells[i - 1], cell)) return null;
                }
                return {
                    type,
                    count: cells.length,
                    direction: directionFromCells(cells),
                    // Persisted so the ghost can replay this exact selection path visually.
                    cells: cells.map((c) => ({ row: c.row, col: c.col }))
                };
            }

            function directionFromCells(cells) {
                if (cells.length < 2) return "default";
                const first = cells[0];
                const last = cells[cells.length - 1];
                const rowDelta = last.row - first.row;
                const colDelta = last.col - first.col;
                if (rowDelta === 0) return "horizontal";
                if (colDelta === 0) return "vertical";
                return Math.sign(rowDelta) === Math.sign(colDelta) ? "diagonal-down" : "diagonal-up";
            }

            function updateSelectionMarks() {
                gridContainer.querySelectorAll(".tile").forEach((tile) => {
                    tile.classList.remove("selected", "invalid");
                });
                if (!selection) return;
                selection.cells.forEach((cell) => {
                    const tile = findTile(cell.row, cell.col);
                    if (!tile) return;
                    tile.classList.add("selected");
                    if (selection.invalid) tile.classList.add("invalid");
                });
                renderTrail();
                // Drive the big live shout from the current chain head + length. Skipped once
                // the shout has flown up (settled) or while flagged invalid (mid pop-out).
                if (!selection.invalid) {
                    const head = getBlock(selection.cells[0].row, selection.cells[0].col);
                    if (head) liveShout("player", head.type, selection.cells.length);
                }
            }

            // Cell centres are derived analytically from the (uniform) grid geometry, read
            // once per drag — no per-tile getBoundingClientRect, so no layout thrash on move.
            function computeTrailGeometry() {
                const cs = getComputedStyle(gridContainer);
                const padX = parseFloat(cs.paddingLeft) || 0;
                const padY = parseFloat(cs.paddingTop) || 0;
                const gap = parseFloat(cs.columnGap || cs.gap) || 0;
                const innerW = gridContainer.clientWidth - padX - (parseFloat(cs.paddingRight) || 0);
                const cell = (innerW - (gridSize - 1) * gap) / gridSize;
                return { padX, padY, gap, cell };
            }

            function ensureTrailOverlay() {
                if (!trailSvg) {
                    const ns = "http://www.w3.org/2000/svg";
                    trailSvg = document.createElementNS(ns, "svg");
                    trailSvg.setAttribute("class", "trail-overlay");
                    trailGlow = document.createElementNS(ns, "polyline");
                    trailGlow.setAttribute("class", "trail-glow");
                    trailLine = document.createElementNS(ns, "polyline");
                    trailLine.setAttribute("class", "trail-line");
                    trailSvg.appendChild(trailGlow);
                    trailSvg.appendChild(trailLine);
                }
                // renderGrid() wipes the container each round, so re-attach if detached.
                if (trailSvg.parentNode !== gridContainer) gridContainer.appendChild(trailSvg);
                return trailSvg;
            }

            function renderTrail() {
                if (!selection || !trailGeo || selection.cells.length < 2) {
                    hideTrail();
                    return;
                }
                const { padX, padY, gap, cell } = trailGeo;
                const step = cell + gap;
                const points = selection.cells.map((c) => {
                    const x = padX + c.col * step + cell / 2;
                    const y = padY + c.row * step + cell / 2;
                    return `${x.toFixed(1)},${y.toFixed(1)}`;
                }).join(" ");
                const width = Math.max(3, cell * 0.16);
                ensureTrailOverlay();
                trailSvg.style.display = "block";
                trailSvg.classList.toggle("invalid", !!selection.invalid);
                trailGlow.setAttribute("stroke-width", (width * 2.4).toFixed(1));
                trailGlow.setAttribute("points", points);
                trailLine.setAttribute("stroke-width", width.toFixed(1));
                trailLine.setAttribute("points", points);
            }

            function hideTrail() {
                if (trailSvg) trailSvg.style.display = "none";
            }

            // --- Ghost selection replay -------------------------------------------------
            // Rebuilds the live board as a throwaway black grid that reveals only the
            // ghost's recorded selection (with its real block type), then animates the
            // saved trail through it. The `grid` model is never mutated, so a single
            // renderGrid() fully restores the real board afterwards.
            function renderGhostReplayGrid(ghostType, revealedCount) {
                gridContainer.classList.add("ghost-replay");
                gridContainer.innerHTML = "";
                const revealKeys = new Set(
                    ghostReplayCells.slice(0, revealedCount).map((c) => `${c.row},${c.col}`)
                );
                const imageUrl = assetUrls[`block_${ghostType}`];
                for (let row = 0; row < gridSize; row++) {
                    for (let col = 0; col < gridSize; col++) {
                        const tile = document.createElement("button");
                        tile.type = "button";
                        tile.dataset.row = String(row);
                        tile.dataset.col = String(col);
                        if (revealKeys.has(`${row},${col}`)) {
                            tile.className = `tile ${ghostType} ghost-reveal`;
                            if (imageUrl) {
                                const img = document.createElement("img");
                                img.alt = BLOCK_META[ghostType].label;
                                img.src = imageUrl;
                                img.onerror = () => {
                                    img.remove();
                                    tile.appendChild(fallbackLabel(ghostType));
                                };
                                tile.appendChild(img);
                            } else {
                                tile.appendChild(fallbackLabel(ghostType));
                            }
                        } else {
                            tile.className = "tile ghost-black";
                        }
                        gridContainer.appendChild(tile);
                    }
                }
                // renderGrid()-style wipe detaches the trail SVG / banner; re-attach on top.
                ensureTrailOverlay();
                ensureGhostBanner();
            }

            // Banner overlaid on the black replay grid (e.g. "Last run, round 3/7").
            // Re-attached after each grid wipe; renderGrid() removes it when play resumes.
            function ensureGhostBanner() {
                if (!ghostBanner) {
                    ghostBanner = document.createElement("div");
                    ghostBanner.className = "ghost-replay-banner";
                }
                if (ghostBanner.parentNode !== gridContainer) gridContainer.appendChild(ghostBanner);
                return ghostBanner;
            }

            // Draws the ghost's trail directly (does NOT touch the live `selection`/`trailGeo`
            // that renderTrail() reads, so the player's next drag stays pristine). Mirrors the
            // pixel math in renderTrail().
            function drawGhostTrail(cells, count, geo) {
                const { padX, padY, gap, cell } = geo;
                const step = cell + gap;
                const points = cells.slice(0, count).map((c) => {
                    const x = padX + c.col * step + cell / 2;
                    const y = padY + c.row * step + cell / 2;
                    return `${x.toFixed(1)},${y.toFixed(1)}`;
                }).join(" ");
                const width = Math.max(3, cell * 0.16);
                ensureTrailOverlay();
                trailSvg.style.display = "block";
                trailSvg.classList.remove("invalid");
                trailSvg.classList.add("ghost");
                trailGlow.setAttribute("stroke-width", (width * 2.4).toFixed(1));
                trailGlow.setAttribute("points", points);
                trailLine.setAttribute("stroke-width", width.toFixed(1));
                trailLine.setAttribute("points", points);
            }

            // Returns true if a trail was actually replayed (so the caller knows the ghost
            // callout has already popped), false when skipped (default wraith / legacy saves).
            async function playGhostSelectionReplay(ghostAction) {
                // Default wraith / legacy v2 ghosts carry no positions -> no replay beat.
                if (!ghostAction || !Array.isArray(ghostAction.cells)) return false;
                const cells = ghostAction.cells.filter((c) => inBounds(c.row, c.col));
                if (cells.length < 2) return false;

                ghostReplayCells = cells;
                const geo = computeTrailGeometry(); // box stays stable across innerHTML swaps

                // Which move of your last run this is: ghostActionIndex was already advanced.
                const total = activeGhostActions.length || 1;
                const roundNum = ((ghostActionIndex - 1) % total + total) % total + 1;
                ensureGhostBanner().textContent = `Last run, round ${roundNum}/${total}`;

                renderGhostReplayGrid(ghostAction.type, 0); // black board + banner, nothing revealed
                await sleep(TIMING.ghost.bannerLeadMs);      // let the banner register first

                ensureShout("ghost").state = "idle"; // re-arm the ghost shout for this replay
                renderGhostReplayGrid(ghostAction.type, 1);
                playSelectNote(0); // ghost retraces its run with the same rising cadence as you
                liveShout("ghost", ghostAction.type, 1);
                await sleep(TIMING.ghost.firstTileMs);
                for (let i = 2; i <= cells.length; i++) {
                    renderGhostReplayGrid(ghostAction.type, i);
                    drawGhostTrail(cells, i, geo);
                    playSelectNote(i - 1); // one rising note per revealed tile
                    liveShout("ghost", ghostAction.type, i); // big shout grows with the reveal
                    await sleep(TIMING.ghost.perTileMs);
                }
                // Ghost just "finished tracing" -> fly its big shout down to the VS slot with its total.
                releaseShout("ghost", ghostAction);
                await sleep(TIMING.ghost.finalHoldMs); // hold so the player can digest the full selection

                trailSvg.classList.remove("ghost");
                hideTrail();
                gridContainer.classList.remove("ghost-replay");
                ghostReplayCells = [];
                renderGrid(); // clean rebuild from the untouched grid[][] (also removes the banner)
                return true;
            }

            function flashInvalidSelection() {
                if (selection) {
                    selection.invalid = true;
                    updateSelectionMarks();
                }
                setMessage("");
                setTimeout(clearSelection, 260);
            }

            function clearSelection() {
                selection = null;
                selectionIsValid = false;
                trailGeo = null;
                lastHover = null;
                hideTrail();
                gridContainer.querySelectorAll(".tile").forEach((tile) => {
                    tile.classList.remove("selected", "invalid");
                });
            }

            async function executeRound(cells) {
                if (resolving || gameOver) return;
                const playerAction = validateSelection(cells);
                if (!playerAction) {
                    flashInvalidSelection();
                    return;
                }

                resolving = true;
                gridContainer.classList.add("locked");
                setMessage("");
                playSound("block_match_sfx");

                currentRunActions.push(playerAction);
                const ghostStep = ghostActionIndex % activeGhostActions.length;
                const ghostAction = cloneAction(activeGhostActions[ghostStep] || DEFAULT_GHOST_ACTIONS[0]);
                ghostActionIndex += 1;

                setTurnStatus(ghostTurnText(ghostStep));
                // Your big shout was already launched up to the VS slot on pointer-up.
                markRemoving(cells);
                await sleep(TIMING.tileRemoveMs);
                removeAndRefill(cells);
                renderGrid();
                await sleep(TIMING.boardSettleMs); // let the refilled board settle before handing off to the ghost

                // Show what the ghost picked before the scene effects fire. The replay flies the
                // ghost shout down itself when its trail finishes; if there's no replay (default
                // wraith / legacy saves) we settle it at the slot here so both totals still read.
                const ghostReplayed = await playGhostSelectionReplay(ghostAction);
                if (!ghostReplayed) {
                    releaseShout("ghost", ghostAction);
                    await sleep(TIMING.callout.soloHoldMs);
                }

                // Both big shouts stay flanking VS through the whole attack sequence...
                await resolveCombat(playerAction, ghostAction);
                // ...then jelly out as the round ends.
                hideShout("player");
                hideShout("ghost");
                roundNumber += 1;
                renderHud();

                if (await maybeEndGame()) return;

                setTurnStatus("Player turn: waiting");
                renderGhostHint();
                setMessage(""); // clear the top between rounds (no instruction text)
                gridContainer.classList.remove("locked");
                resolving = false;
            }

            async function resolveCombat(playerAction, ghostAction) {
                clearStatus();

                // 1) Reveal beat: let the player read the matchup before anything fires.
                revealTurnStatus();
                const youText = `${BLOCK_META[playerAction.type].label} x${playerAction.count}`;
                const oppText = `${BLOCK_META[ghostAction.type].label} x${ghostAction.count}`;
                setMessage(opponentIsOfficialGhost
                    ? `Your echo: ${oppText} — counter it!`
                    : `You: ${youText}  vs  ${opponentLabel}: ${oppText}`);
                await sleep(460);

                // 2) Shields rise FIRST, with priority, and stay up through the clash.
                //    A shield is an absorption layer worth actionAmount() (count*3),
                //    shown as the blue bar; it expires at the end of the round.
                const playerHasShield = playerAction.type === "shield";
                const ghostHasShield = ghostAction.type === "shield";
                let playerShield = null;
                let ghostShield = null;
                if (playerHasShield) {
                    setStatus("player", "shield", "Shield");
                    player.shield = actionAmount(playerAction);
                    playerShield = raiseShield("player");
                }
                if (ghostHasShield) {
                    setStatus("ghost", "shield", "Shield");
                    ghost.shield = actionAmount(ghostAction);
                    ghostShield = raiseShield("ghost");
                }
                if (playerHasShield || ghostHasShield) {
                    renderHud();
                    setMessage(`${shieldOwners(playerHasShield, ghostHasShield)} raised a shield!`);
                    await sleep(480);
                }

                // 3) Resolve flags. Shield no longer blocks; ice always cancels the
                //    opponent's offensive action (sword/heal). Shield absorption is
                //    handled inside performSword.
                const playerCanceled = ghostAction.type === "ice";
                const ghostCanceled = playerAction.type === "ice";

                // 4) Frozen feedback BEFORE the cancelled action would have fired.
                if (playerCanceled) {
                    setStatus("player", "cancel", "Frozen");
                    showFrozen("player");
                    setMessage(`Frozen! Player's ${BLOCK_META[playerAction.type].label} won't go off.`);
                }
                if (ghostCanceled) {
                    setStatus("ghost", "cancel", "Frozen");
                    showFrozen("ghost");
                    setMessage(`${opponentLabel} is frozen — ${BLOCK_META[ghostAction.type].label} cancelled.`);
                }
                if (playerCanceled || ghostCanceled) await sleep(360);

                // 5) Ice projectiles. Shield no longer blocks ice.
                const iceEffects = [];
                if (playerAction.type === "ice") iceEffects.push(performIce("player", "ghost"));
                if (ghostAction.type === "ice") iceEffects.push(performIce("ghost", "player"));
                await Promise.all(iceEffects);

                // 6) Swords. The target's shield absorbs first; leftover hits HP.
                const swordEffects = [];
                if (playerAction.type === "sword") swordEffects.push(performSword("player", playerAction, playerCanceled, ghostShield));
                if (ghostAction.type === "sword") swordEffects.push(performSword("ghost", ghostAction, ghostCanceled, playerShield));
                await Promise.all(swordEffects);

                // 7) Heals.
                const healEffects = [];
                if (playerAction.type === "heart") healEffects.push(performHeal("player", playerAction, playerCanceled));
                if (ghostAction.type === "heart") healEffects.push(performHeal("ghost", ghostAction, ghostCanceled));
                await Promise.all(healEffects);

                // 8) Drop any shields that were never struck. Shields expire each round
                //    (not cumulative): clear the absorption and empty the blue bar.
                //    If a shield is expiring with charge left (no attack drained it),
                //    let the bar empty at the same calm pace as an absorption beat (640ms)
                //    instead of snapping shut — so the round closes the same with or
                //    without an attack.
                await sleep(160);
                fadeShield(playerShield);
                fadeShield(ghostShield);
                const shieldExpiring = player.shield > 0 || ghost.shield > 0;
                player.shield = 0;
                ghost.shield = 0;
                renderHud();
                if (shieldExpiring) await sleep(640);
                clearStatus();
            }

            function isHostile(type) {
                return type === "sword" || type === "ice";
            }

            async function performSword(actor, action, canceled, targetShield) {
                const target = actor === "player" ? "ghost" : "player";
                if (canceled) {
                    // Frozen: the strike never leaves the hand.
                    showBurst(actor, "ice");
                    return sleep(260);
                }
                await projectile(actor, target, "sword");
                let amount = Math.round(actionAmount(action) * Number(settings.damageMultiplier || 1));
                const targetObj = target === "player" ? player : ghost;
                // Shield absorbs first: the blue bar drains before any HP is lost.
                if (targetObj.shield > 0) {
                    const absorbed = Math.min(targetObj.shield, amount);
                    targetObj.shield -= absorbed;
                    amount -= absorbed;
                    renderHud();
                    showBurst(target, "block");
                    floatNumber(target, `-${absorbed}`, "shield");
                    if (targetObj.shield <= 0) shatterShield(targetShield);
                    await sleep(640);
                }
                // Leftover damage lands on HP in the same round.
                if (amount > 0) {
                    damage(target, amount, actor);
                    showBurst(target, "hit");
                    floatNumber(target, `-${amount}`, "dmg");
                    shake(target);
                    await sleep(260);
                }
            }

            async function performIce(actor, target) {
                await projectile(actor, target, "ice");
                showBurst(target, "ice");
                playSound("ice_freeze_sfx");
                await sleep(240);
            }

            async function performHeal(actor, action, canceled) {
                if (canceled) {
                    showBurst(actor, "ice");
                    return sleep(260);
                }
                const amount = Math.round(actionAmount(action) * Number(settings.healMultiplier || 1));
                const before = actor === "player" ? player.hp : ghost.hp;
                heal(actor, amount);
                const gained = (actor === "player" ? player.hp : ghost.hp) - before;
                healParticles(actor);
                pulseHeal(actor);
                playSound("heal_sfx");
                if (gained > 0) {
                    floatNumber(actor, `+${gained}`, "heal");
                } else {
                    setMessage(`${labelFor(actor)}: HP already full.`);
                }
                await sleep(620);
            }

            function actionAmount(action) {
                // Sword scales at 5 per tile; heart and shield (absorption) at 3 per tile.
                const per = action.type === "sword" ? 5 : 3;
                return action.count * per;
            }

            function damage(target, amount, actor) {
                if (target === "player") {
                    player.hp = Math.max(0, player.hp - amount);
                } else {
                    ghost.hp = Math.max(0, ghost.hp - amount);
                }
                if (actor === "player") damageDealt += amount;
                renderHud();
            }

            function heal(actor, amount) {
                if (actor === "player") {
                    player.hp = Math.min(player.maxHp, player.hp + amount);
                    healingDone += amount;
                } else {
                    ghost.hp = Math.min(ghost.maxHp, ghost.hp + amount);
                }
                renderHud();
            }

            async function maybeEndGame() {
                if (player.hp <= 0) {
                    await endGame(false);
                    return true;
                }
                if (ghost.hp <= 0) {
                    await endGame(true);
                    return true;
                }
                return false;
            }

            async function endGame(victory) {
                gameOver = true;
                resolving = true;
                gridContainer.classList.add("locked");
                const defeatByGhost = !victory && opponentIsOfficialGhost;
                if (victory) {
                    if (startedWithoutOfficialGhost) {
                        setMessage("Your soul tears free — your ghost is forming.");
                        await soulExtraction();
                    }
                    await saveOfficialGhost();
                    playSound("ghost_victory_sfx");
                } else {
                    await clearSavedGhost();
                    playSound("defeat_sfx");
                }

                const title = victory ? "Victory" : (defeatByGhost ? "Beaten by Your Ghost" : "Defeat");
                let outcomeLine;
                if (victory) {
                    outcomeLine = startedWithoutOfficialGhost
                        ? "Your run is now the ghost — next time you fight yourself."
                        : "You outplayed your ghost. This run becomes the new ghost.";
                } else if (defeatByGhost) {
                    outcomeLine = "You lost to your own ghost. The history is wiped — you start from nothing.";
                } else {
                    outcomeLine = `The ${opponentLabel} won. No ghost forms — next run starts fresh.`;
                }

                if (victory) {
                    // The game is continuous: flash a single victory line, then roll straight
                    // into the next level (now vs the run we just saved) — no click, no page
                    // reload. The text keeps fading over the freshly-seeded board.
                    await showVictoryShout("Now, fight your own ghost.");
                    await startNewMatch();
                    return;
                }

                // Defeat is terminal: keep the blocking end screen with its stats + Play Again.
                gameOverTitle.textContent = title;
                gameOverTitle.className = "defeat";
                gameOverStats.innerHTML = [
                    `<div>Rounds: ${Math.max(1, roundNumber)}</div>`,
                    `<div>Damage Dealt: ${damageDealt}</div>`,
                    `<div>Healing Done: ${healingDone}</div>`,
                    `<div>${outcomeLine}</div>`
                ].join("");
                gameOverScreen.classList.add("visible");
            }

            async function saveOfficialGhost() {
                // Commit the completed run as the ghost the player will face next time.
                await saveState({
                    version: 3,
                    ghostActions: currentRunActions.map(cloneAction),
                    hasOfficialGhost: currentRunActions.length > 0
                });
            }

            async function clearSavedGhost() {
                // On defeat the history resets: next run starts fresh vs the wild wraith.
                await saveState({
                    version: 3,
                    ghostActions: [],
                    hasOfficialGhost: false
                });
            }

            async function saveState(state) {
                try {
                    if (window.lib && typeof lib.saveUserGameState === "function") {
                        await lib.saveUserGameState(state);
                    }
                } catch (error) {
                    logError("saveUserGameState failed", error);
                }
            }

            function createPlayableGrid() {
                let candidate = [];
                for (let attempt = 0; attempt < 60; attempt++) {
                    candidate = [];
                    for (let row = 0; row < gridSize; row++) {
                        candidate[row] = [];
                        for (let col = 0; col < gridSize; col++) {
                            candidate[row][col] = createBlock();
                        }
                    }
                    if (hasEasyLine(candidate)) return candidate;
                }
                plantLine(candidate);
                return candidate;
            }

            function createBlock(forcedType) {
                return {
                    id: `${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`,
                    type: forcedType || randomBlockType()
                };
            }

            function randomBlockType() {
                const dist = settings.blockDistribution || DEFAULT_SETTINGS.blockDistribution;
                const total = BLOCK_TYPES.reduce((sum, type) => sum + Math.max(0, Number(dist[type]) || 0), 0) || 1;
                let cursor = Math.random() * total;
                for (const type of BLOCK_TYPES) {
                    cursor -= Math.max(0, Number(dist[type]) || 0);
                    if (cursor <= 0) return type;
                }
                return "sword";
            }

            // A straight horizontal or vertical run of 3+ is easy to drag on touch.
            // The grid guarantees one of these so the board never feels stuck even when
            // the only remaining match would otherwise be an awkward diagonal.
            function hasEasyLine(sourceGrid) {
                return hasAvailableLine(sourceGrid, [
                    { row: 0, col: 1 },
                    { row: 1, col: 0 }
                ]);
            }

            function hasAvailableLine(sourceGrid, directions) {
                directions = directions || [
                    { row: 0, col: 1 },
                    { row: 1, col: 0 },
                    { row: 1, col: 1 },
                    { row: 1, col: -1 }
                ];
                for (let row = 0; row < gridSize; row++) {
                    for (let col = 0; col < gridSize; col++) {
                        const type = sourceGrid[row][col].type;
                        for (const direction of directions) {
                            let count = 1;
                            for (let step = 1; step < 3; step++) {
                                const nextRow = row + direction.row * step;
                                const nextCol = col + direction.col * step;
                                if (!inBounds(nextRow, nextCol) || sourceGrid[nextRow][nextCol].type !== type) break;
                                count += 1;
                            }
                            if (count >= 3) return true;
                        }
                    }
                }
                return false;
            }

            function plantLine(sourceGrid) {
                const row = Math.min(1, gridSize - 1);
                const type = randomBlockType();
                for (let col = 0; col < Math.min(3, gridSize); col++) {
                    sourceGrid[row][col] = createBlock(type);
                }
            }

            function removeAndRefill(cells) {
                cells.forEach((cell) => {
                    if (inBounds(cell.row, cell.col)) grid[cell.row][cell.col] = null;
                });

                for (let col = 0; col < gridSize; col++) {
                    const survivors = [];
                    for (let row = gridSize - 1; row >= 0; row--) {
                        if (grid[row][col]) survivors.push(grid[row][col]);
                    }
                    for (let row = gridSize - 1; row >= 0; row--) {
                        grid[row][col] = survivors.length ? survivors.shift() : createBlock();
                    }
                }

                if (!hasEasyLine(grid)) {
                    plantLine(grid);
                }
            }

            function renderAll() {
                renderHud();
                renderGrid();
                setTurnStatus("Player turn: waiting");
                renderGhostHint();
            }

            function renderHud() {
                playerHpText.textContent = `${player.hp} / ${player.maxHp}`;
                ghostHpText.textContent = `${ghost.hp} / ${ghost.maxHp}`;
                playerHpBar.style.width = `${Math.max(0, player.hp / player.maxHp * 100)}%`;
                ghostHpBar.style.width = `${Math.max(0, ghost.hp / ghost.maxHp * 100)}%`;
                renderShieldBar(playerShieldBar, playerShieldText, player.shield, player.maxHp);
                renderShieldBar(ghostShieldBar, ghostShieldText, ghost.shield, ghost.maxHp);
                roundCounter.textContent = `Round ${roundNumber}`;
            }

            function renderShieldBar(bar, text, shield, maxHp) {
                const s = shield > 0 ? shield : 0;
                const pct = maxHp > 0 ? Math.min(100, s / maxHp * 100) : 0;
                bar.style.width = `${pct}%`;
                if (s > 0) {
                    text.textContent = s;
                    text.style.opacity = "1";
                } else {
                    text.style.opacity = "0";
                }
            }

            function renderGrid() {
                gridContainer.innerHTML = "";
                for (let row = 0; row < gridSize; row++) {
                    for (let col = 0; col < gridSize; col++) {
                        const block = grid[row][col];
                        const tile = document.createElement("button");
                        tile.type = "button";
                        tile.className = `tile ${block.type}`;
                        tile.dataset.row = String(row);
                        tile.dataset.col = String(col);
                        tile.dataset.type = block.type;
                        tile.setAttribute("aria-label", `${BLOCK_META[block.type].label} block row ${row + 1} column ${col + 1}`);

                        const imageUrl = assetUrls[`block_${block.type}`];
                        if (imageUrl) {
                            const img = document.createElement("img");
                            img.alt = BLOCK_META[block.type].label;
                            img.src = imageUrl;
                            img.onerror = () => {
                                img.remove();
                                tile.appendChild(fallbackLabel(block.type));
                            };
                            tile.appendChild(img);
                        } else {
                            tile.appendChild(fallbackLabel(block.type));
                        }
                        gridContainer.appendChild(tile);
                    }
                }
            }

            function fallbackLabel(type) {
                const span = document.createElement("span");
                span.className = "tile-fallback";
                span.textContent = BLOCK_META[type].short;
                return span;
            }

            function setTurnStatus(text) {
                turnStatus.textContent = text;
            }

            // Hint badge: the spell the ghost will play this round (the currently queued
            // action — executeRound consumes this same index before incrementing).
            function renderGhostHint() {
                const action = activeGhostActions[ghostActionIndex % activeGhostActions.length];
                const url = action ? assetUrls[`block_${action.type}`] : null;
                if (url) {
                    ghostMoveHint.style.setProperty("--hint-icon", `url("${url}")`);
                    ghostMoveHint.hidden = false;
                } else {
                    ghostMoveHint.hidden = true;
                    ghostMoveHint.style.removeProperty("--hint-icon");
                }
            }

            // Text shown while the opponent takes its turn. The official ghost is an exact
            // replay of your last run; the wild wraith follows the fixed ritual pattern.
            function ghostTurnText(step) {
                const total = activeGhostActions.length || DEFAULT_GHOST_ACTIONS.length;
                const round = (step % total) + 1;
                return opponentIsOfficialGhost
                    ? `Ghost recreating your last run, round ${round}/${total}`
                    : `${opponentLabel} attacks, round ${round}/${total}`;
            }

            function revealTurnStatus() {
                turnStatus.classList.remove("reveal");
                void turnStatus.offsetWidth;
                turnStatus.classList.add("reveal");
                setTimeout(() => turnStatus.classList.remove("reveal"), 480);
            }

            // The #vs-*-callout nodes are kept only as invisible geometry anchors (the slots
            // the combo shouts fly to); they're never shown. clearVsCallouts also dismisses
            // the big shouts on match reset.
            function clearVsCallouts() {
                [vsPlayerCallout, vsGhostCallout].forEach((el) => el.classList.remove("show", "hide"));
                hideShout("player");
                hideShout("ghost");
            }

            // --- Combo "shout" -----------------------------------------------------------
            // A big, element-coloured callout that grows live over the grid/battlefield seam
            // as a combo is traced, then flies to the VS slot (up for the player, down for the
            // ghost) and morphs into the round's total value. Purely visual: it only reads
            // selection/settings and never mutates game state. The old #vs-*-callout nodes are
            // kept as invisible geometry anchors (their collapsed scale(0) box marks the slot
            // the shout flies to). TYPE_COLOR / shouts are declared up top with the rest of
            // the game state so the early startNewMatch() -> clearVsCallouts() can touch them.

            function ensureShout(side) {
                let s = shouts[side];
                if (s) return s;
                const outer = document.createElement("div");
                outer.className = `combo-shout ${side}`;
                const inner = document.createElement("div");
                inner.className = "combo-shout-text";
                const nameEl = document.createElement("span"); // the word (never bounces)
                nameEl.className = "shout-name";
                const numEl = document.createElement("span");  // ×N / total (the only part that pops)
                numEl.className = "shout-num";
                inner.appendChild(nameEl);
                inner.appendChild(numEl);
                outer.appendChild(inner);
                world.appendChild(outer);
                s = shouts[side] = { outer, inner, nameEl, numEl, state: "idle", count: 0 };
                return s;
            }

            function shoutName(type) {
                return COMBAT_CALLOUT[type] || type.toUpperCase();
            }

            // Released value, split into {name, num}. The jelly only ever fires on `num`, so
            // numeric totals bounce while the ice word ("FREEZE") stays still.
            function shoutReleaseParts(action) {
                if (action.type === "ice") return { name: shoutName(action.type), num: "" };
                if (action.type === "sword") return { name: "", num: `−${Math.round(actionAmount(action) * settings.damageMultiplier)}` };
                if (action.type === "heart") return { name: "", num: `+${Math.round(actionAmount(action) * settings.healMultiplier)}` };
                return { name: "", num: String(actionAmount(action)) }; // shield: absorption (count*3)
            }

            // Set the two spans; replay the jelly on the number span only (and only when it
            // actually holds something, so words never bounce).
            function applyShoutText(s, name, num, popNumber) {
                s.inner.classList.remove("out");
                s.nameEl.textContent = name;
                s.numEl.textContent = num;
                s.numEl.classList.remove("pop");
                if (popNumber && num) {
                    void s.numEl.offsetWidth; // restart the squash animation
                    s.numEl.classList.add("pop");
                }
            }

            // Reset the outer back to its base (seam) position, big size, no flight transform.
            function resetShoutPosition(outer) {
                outer.style.transition = "none";
                outer.style.left = "50%";
                outer.style.top = "var(--battle-height)";
                outer.style.fontSize = "";
                outer.style.transform = "translate(-50%, -50%)";
                void outer.offsetWidth; // commit before re-enabling transitions
                outer.style.transition = "";
            }

            // Called as the player traces (or the ghost replay reveals): show/update the big
            // label at the seam, popping only when the count actually changes.
            function liveShout(side, type, count) {
                const s = ensureShout(side);
                if (s.state === "settled") return; // already flown up; don't yank it back
                if (s.state !== "live") resetShoutPosition(s.outer);
                s.outer.style.setProperty("--shout-color", TYPE_COLOR[type] || "#fff");
                s.outer.classList.add("show");
                const changed = s.state !== "live" || s.count !== count;
                // Name stays put; only the ×N number bounces when the count changes.
                applyShoutText(s, shoutName(type), count > 1 ? `×${count}` : "", changed);
                s.state = "live";
                s.count = count;
            }

            // End of a trace/replay. With a valid action: fly to the VS slot and show the total.
            // Without one (cancel): pop out in place. No build-up (e.g. ghost with no replay):
            // appear straight at the slot with the total.
            function releaseShout(side, action) {
                const s = ensureShout(side);
                if (!action) {
                    if (s.state === "idle") return;
                    s.inner.classList.add("out");
                    s.outer.classList.remove("show");
                    s.state = "idle";
                    return;
                }
                const anchor = side === "player" ? vsPlayerCallout : vsGhostCallout;
                const target = centerOf(anchor);
                s.outer.style.setProperty("--shout-color", TYPE_COLOR[action.type] || "#fff");

                if (s.state === "live") {
                    // Fly from the current seam position to the slot, shrinking as it goes.
                    const from = centerOf(s.outer);
                    s.outer.style.left = `${from.x}px`;
                    s.outer.style.top = `${from.y}px`;
                    s.outer.style.transform = "translate(-50%, -50%)";
                    void s.outer.offsetWidth; // commit the start before tweening
                    requestAnimationFrame(() => {
                        const dx = target.x - from.x;
                        const dy = target.y - from.y;
                        s.outer.style.fontSize = "20px";
                        s.outer.style.transform = `translate(-50%, -50%) translate(${dx}px, ${dy}px)`;
                    });
                    const parts = shoutReleaseParts(action);
                    applyShoutText(s, parts.name, parts.num, true);
                } else {
                    // No build-up to fly from: just appear at the slot.
                    resetShoutPosition(s.outer);
                    s.outer.style.transition = "none";
                    s.outer.style.left = `${target.x}px`;
                    s.outer.style.top = `${target.y}px`;
                    s.outer.style.fontSize = "20px";
                    s.outer.style.transform = "translate(-50%, -50%)";
                    void s.outer.offsetWidth;
                    s.outer.style.transition = "";
                    s.outer.classList.add("show");
                    const parts = shoutReleaseParts(action);
                    applyShoutText(s, parts.name, parts.num, true);
                }
                s.state = "settled";
            }

            function hideShout(side) {
                const s = shouts[side];
                if (!s || s.state === "idle") return;
                s.inner.classList.add("out");
                s.outer.classList.remove("show");
                s.state = "idle";
            }

            function labelFor(side) {
                return side === "player" ? "Player" : opponentLabel;
            }

            function shieldOwners(playerHas, ghostHas) {
                if (playerHas && ghostHas) return "Both fighters";
                return playerHas ? "Player" : opponentLabel;
            }

            function setStatus(target, kind, text) {
                const container = target === "player" ? playerStatus : ghostStatus;
                const chip = document.createElement("div");
                chip.className = `status-chip ${kind}`;
                chip.textContent = text;
                container.appendChild(chip);
            }

            function clearStatus() {
                playerStatus.innerHTML = "";
                ghostStatus.innerHTML = "";
            }

            function markRemoving(cells) {
                cells.forEach((cell) => {
                    const tile = findTile(cell.row, cell.col);
                    if (tile) tile.classList.add("removing");
                });
            }

            function findTile(row, col) {
                return gridContainer.querySelector(`.tile[data-row="${row}"][data-col="${col}"]`);
            }

            function getBlock(row, col) {
                return inBounds(row, col) ? grid[row][col] : null;
            }

            function inBounds(row, col) {
                return row >= 0 && row < gridSize && col >= 0 && col < gridSize;
            }

            function projectile(actor, target, type) {
                const from = centerOf(effectAnchor(actor));
                const to = centerOf(effectAnchor(target));

                // Muzzle flash at the attacker so the shot clearly reads as "fired".
                const flash = document.createElement("div");
                flash.className = `effect-burst ${type === "ice" ? "ice" : "hit"}`;
                flash.style.left = `${from.x}px`;
                flash.style.top = `${from.y}px`;
                effectLayer.appendChild(flash);
                setTimeout(() => flash.remove(), 480);
                if (type !== "ice") playSound("sword_attack_sfx");

                const projectileEl = document.createElement("div");
                projectileEl.className = `effect-projectile ${type === "ice" ? "ice" : "sword"}`;
                projectileEl.style.transform = `translate(${from.x}px, ${from.y}px) translate(-50%, -50%)`;
                effectLayer.appendChild(projectileEl);

                // Force the browser to commit the start position before tweening to the
                // end, so the flight always animates — even when a shield was raised the
                // same beat (otherwise the transition is skipped and it jumps to target).
                void projectileEl.offsetWidth;
                requestAnimationFrame(() => {
                    projectileEl.style.transform = `translate(${to.x}px, ${to.y}px) translate(-50%, -50%)`;
                });

                return sleep(430).then(() => {
                    projectileEl.remove();
                });
            }

            function raiseShield(target) {
                playSound("shield_sfx");
                const center = centerOf(effectAnchor(target));
                const shield = document.createElement("div");
                shield.className = "effect-shield held";
                shield.style.left = `${center.x}px`;
                shield.style.top = `${center.y}px`;
                effectLayer.appendChild(shield);
                return shield;
            }

            function shatterShield(shield) {
                if (!shield) return;
                shield.classList.remove("held");
                shield.classList.add("shield-shatter");
                setTimeout(() => shield.remove(), 440);
            }

            function fadeShield(shield) {
                if (!shield) return;
                shield.classList.remove("held");
                shield.style.transition = "opacity 280ms ease";
                shield.style.opacity = "0";
                setTimeout(() => shield.remove(), 300);
            }

            function showBurst(target, kind) {
                const center = centerOf(effectAnchor(target));
                const burst = document.createElement("div");
                burst.className = `effect-burst ${kind}`;
                burst.style.left = `${center.x}px`;
                burst.style.top = `${center.y}px`;
                effectLayer.appendChild(burst);
                setTimeout(() => burst.remove(), 560);
            }

            function healParticles(target) {
                const center = centerOf(effectAnchor(target));
                for (let i = 0; i < 10; i++) {
                    const particle = document.createElement("div");
                    particle.className = "effect-heal";
                    particle.style.left = `${center.x + (Math.random() - 0.5) * 62}px`;
                    particle.style.top = `${center.y + (Math.random() - 0.5) * 42}px`;
                    particle.style.setProperty("--heal-x", `${(Math.random() - 0.5) * 90}px`);
                    effectLayer.appendChild(particle);
                    setTimeout(() => particle.remove(), 960);
                }
            }

            function showFrozen(target) {
                const el = combatElement(target);
                el.classList.remove("frozen");
                void el.offsetWidth;
                el.classList.add("frozen");
                setTimeout(() => el.classList.remove("frozen"), 650);
            }

            function floatNumber(target, text, kind) {
                const center = centerOf(effectAnchor(target));
                const node = document.createElement("div");
                node.className = `float-text ${kind}`;
                node.textContent = text;
                node.style.left = `${center.x}px`;
                node.style.top = `${center.y - 30}px`;
                effectLayer.appendChild(node);
                // dmg/heal linger longer (1.5s) so progress reads clearly; shield's
                // transient stays 1s since the head badge is its main feedback.
                const lifeMs = (kind === "dmg" || kind === "heal") ? 1520 : 1020;
                setTimeout(() => node.remove(), lifeMs);
            }

            // Victory transition: a single big centered word (combo-shout styling + ghost-blue
            // glow), no background. Lives on #game-world (not #effect-layer, which startNewMatch
            // clears) so it keeps fading over the freshly-seeded next level. Resolves after a
            // short beat; the node finishes its own fade-out animation and self-removes.
            function showVictoryShout(title) {
                const TOAST_MS = 2600;     // must match the .victory-shout CSS animation
                const CONTINUE_MS = 1100;  // when the next level is allowed to start underneath
                const node = document.createElement("div");
                node.className = "victory-shout";
                const span = document.createElement("span");
                span.className = "shout-name"; // reuse the outline + solid-shadow text styling
                span.textContent = title;
                node.appendChild(span);
                world.appendChild(node);
                setTimeout(() => node.remove(), TOAST_MS);
                return sleep(CONTINUE_MS);
            }

            async function soulExtraction() {
                const from = centerOf(effectAnchor("player"));
                const to = centerOf(effectAnchor("ghost"));
                const souls = [];
                for (let i = 0; i < 18; i++) {
                    const soul = document.createElement("div");
                    soul.className = "soul";
                    soul.style.left = `${from.x + (Math.random() - 0.5) * 46}px`;
                    soul.style.top = `${from.y + (Math.random() - 0.5) * 54}px`;
                    soul.style.setProperty("--soul-x", `${to.x - from.x + (Math.random() - 0.5) * 90}px`);
                    soul.style.setProperty("--soul-y", `${to.y - from.y - 30 + (Math.random() - 0.5) * 80}px`);
                    soul.style.animationDelay = `${i * 45}ms`;
                    effectLayer.appendChild(soul);
                    souls.push(soul);
                }
                await sleep(1500);
                souls.forEach((soul) => soul.remove());

                const form = document.createElement("div");
                form.className = "ghost-form";
                form.style.left = `${to.x}px`;
                form.style.top = `${to.y}px`;
                effectLayer.appendChild(form);
                await sleep(1200);
                form.remove();
            }

            function combatElement(target) {
                return target === "player" ? playerCombatant : ghostCombatant;
            }

            // Effects should land ON the character art, not on the whole HP+character
            // column — that column's center sits in the empty band above the sprite.
            function effectAnchor(target) {
                const c = combatElement(target);
                return c.querySelector(".character-wrap") || c;
            }

            function centerOf(element) {
                const worldRect = world.getBoundingClientRect();
                const rect = element.getBoundingClientRect();
                return {
                    x: rect.left - worldRect.left + rect.width / 2,
                    y: rect.top - worldRect.top + rect.height / 2
                };
            }

            function shake(target) {
                const img = target === "player" ? playerImg : ghostImg;
                if (img.hidden) return;
                img.classList.remove("hit-shake");
                void img.offsetWidth;
                img.classList.add("hit-shake");
            }

            function pulseHeal(target) {
                const img = target === "player" ? playerImg : ghostImg;
                if (img.hidden) return;
                img.classList.remove("heal-pulse");
                void img.offsetWidth;
                img.classList.add("heal-pulse");
            }

            function playSound(id) {
                const url = assetUrls[id];
                if (!url) return;
                try {
                    const audio = new Audio(url);
                    audio.volume = 0.35;
                    audio.play().catch(() => {});
                } catch (error) {
                    logError("sound failed", error);
                }
            }

            // === Procedural select-cadence synth (Web Audio, native, zero deps) ===
            // Each tile added to a selection plays a rising note in the harmonic-minor
            // "arcane" voice (4 sine/triangle voices + lowpass, no reverb). Replaces the
            // single block_select MP3 on the player's drag.
            const SYNTH = { preset: "arcane", wave: "sawtooth" };

            let actx = null;
            function ensureAudioCtx() {
                if (!actx) {
                    const Ctor = window.AudioContext || window.webkitAudioContext;
                    if (!Ctor) return null;
                    actx = new Ctor();
                }
                if (actx.state === "suspended") actx.resume();
                return actx;
            }

            // original: pentatonic major, single oscillator, base C4
            const SYNTH_PENTATONIC = [0, 2, 4, 7, 9];
            function freqOriginal(step) {
                const oct = Math.floor(step / SYNTH_PENTATONIC.length);
                const semis = SYNTH_PENTATONIC[((step % SYNTH_PENTATONIC.length) + SYNTH_PENTATONIC.length) % SYNTH_PENTATONIC.length] + oct * 12;
                return 261.63 * Math.pow(2, semis / 12);
            }
            function playOriginal(step, wave) {
                const ctx = ensureAudioCtx();
                if (!ctx) return;
                const now = ctx.currentTime;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = wave;
                osc.frequency.value = freqOriginal(step);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.22, now + 0.008);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
                osc.connect(gain).connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 0.2);
            }

            // arcane / ethereal dry: harmonic minor, 4 voices + lowpass, NO reverb, base A3
            const SYNTH_MINOR_H = [0, 2, 3, 5, 7, 8, 11];
            const SYNTH_ARCANE_VOICES = [
                { t: "sine", oct: 0, det: 0, g: 0.14 },
                { t: "sine", oct: 0, semi: 6, det: 6, g: 0.07 },
                { t: "triangle", oct: 1, det: -5, g: 0.05 },
                { t: "sine", oct: -1, det: 0, g: 0.12 },
            ];
            function freqArcane(step) {
                const oct = Math.floor(step / SYNTH_MINOR_H.length);
                const semis = SYNTH_MINOR_H[((step % SYNTH_MINOR_H.length) + SYNTH_MINOR_H.length) % SYNTH_MINOR_H.length] + oct * 12;
                return 220.0 * Math.pow(2, semis / 12);
            }
            function playArcane(step) {
                const ctx = ensureAudioCtx();
                if (!ctx) return;
                const now = ctx.currentTime;
                const base = freqArcane(step);
                const filter = ctx.createBiquadFilter();
                filter.type = "lowpass";
                filter.frequency.value = 4200;
                filter.Q.value = 1.5;
                filter.connect(ctx.destination);
                SYNTH_ARCANE_VOICES.forEach((v) => {
                    const osc = ctx.createOscillator();
                    const g = ctx.createGain();
                    osc.type = v.t;
                    const semi = v.semi || 0;
                    osc.frequency.value = base * Math.pow(2, (v.oct * 12 + semi) / 12);
                    osc.detune.value = v.det;
                    g.gain.setValueAtTime(0, now);
                    g.gain.linearRampToValueAtTime(v.g, now + 0.02);
                    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
                    osc.connect(g);
                    g.connect(filter);
                    osc.start(now);
                    osc.stop(now + 0.75);
                });
            }

            function playSelectNote(step) {
                try {
                    if (SYNTH.preset === "arcane") {
                        playArcane(step);
                    } else {
                        playOriginal(step, SYNTH.wave);
                    }
                } catch (error) {
                    /* synth is best-effort; never let audio break input */
                }
            }

            function setMessage(text) {
                // The top combat-narration line was removed from the UI; this is now a no-op.
                // Kept so the existing call sites stay valid without edits.
                void text;
            }

            function cloneAction(action) {
                return {
                    type: action.type,
                    count: action.count,
                    direction: action.direction || "default",
                    // Keep cells absent (not []) when missing so "no positions -> skip replay" stays clean.
                    cells: Array.isArray(action.cells)
                        ? action.cells.map((c) => ({ row: c.row, col: c.col }))
                        : undefined
                };
            }

            function clamp(value, min, max) {
                return Math.max(min, Math.min(max, value));
            }

            function escapeAttr(value) {
                return String(value).replace(/"/g, "&quot;");
            }

            function sleep(ms) {
                return new Promise((resolve) => setTimeout(resolve, ms));
            }

            function logError(message, error) {
                try {
                    if (window.lib && typeof lib.log === "function") {
                        lib.log(`${message}: ${error && error.message ? error.message : error}`);
                    } else {
                        console.warn(message, error);
                    }
                } catch (logFailure) {
                    console.warn(message, error);
                }
            }
        }

        if (!window.lib || location.hostname === "127.0.0.1" || location.hostname === "localhost" || location.protocol === "file:") {
            installLocalAstrocadeFallback();
            setTimeout(() => {
                run(window.mode || "play");
            }, 0);
        }
    </script>
</body>
</html>
